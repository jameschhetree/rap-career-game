<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden;
  }
  #gameCanvas { image-rendering: auto; cursor: default; display: block; }
  #mobile-controls {
    display: none; position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%); z-index: 100;
  }
  .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 4px; }
  .d-pad button {
    width: 56px; height: 56px; background: rgba(255,200,50,0.25);
    border: 2px solid rgba(255,200,50,0.5); color: #ffc832;
    font-size: 22px; font-weight: 900; border-radius: 12px;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(4px);
  }
  .d-pad button:active { background: rgba(255,200,50,0.5); }
  .d-pad .up { grid-area: up; } .d-pad .down { grid-area: down; }
  .d-pad .left { grid-area: left; } .d-pad .right { grid-area: right; }
  #action-btn {
    display: none; position: fixed; bottom: 35px; right: 25px;
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(230,57,70,0.5); border: 2px solid rgba(230,57,70,0.7);
    color: #fff; font-weight: 900; font-size: 13px; z-index: 100;
    touch-action: manipulation; backdrop-filter: blur(4px);
  }
  @media (max-width: 768px) {
    #mobile-controls, #action-btn { display: block; }
    body { justify-content: flex-start; padding-top: 8px; }
  }
</style>
</head>

  const maxW = window.innerWidth;

  const scale = Math.min(maxW / 800, maxH / 600, 2);
  canvas.width = Math.floor(800 * Math.min(scale, 1.5));
  canvas.height = Math.floor(600 * Math.min(scale, 1.5));
  canvas.style.width = canvas.width + 'px';

}

function isRoad(tx,ty) {
  for(const r of HROAD) if(r.includes(ty)) return true;
  for(const c of VROAD) if(c.includes(tx)) return true;
  return false;
}
function isSidewalk(tx,ty) {
  if([9,13,19,23,29,33].includes(ty)) return true;
  for(const c of VROAD) { if((tx===c[0]-1||tx===c[c.length-1]+1)&&!isRoad(tx,ty)) return true; }
  return false;
}

  };

  gameScene = 'overworld';

// ========== WORD-FLOW MINIGAME ==========
const FLOW_WORDS = {
  hard:['grind','hustle','strap','block','heat','ice','drip','cash','gang','beef','pull up','slide','flex','bag','stack','trap','plug','grip','smoke','shots'],
  'alt-RnB':['vibe','soul','waves','dream','glow','mood','feel','night','love','rain','kiss','heart','slow','deep','shine','soft','haze','drift','mist','silk'],
  commercial:['fame','money','club','party','dance','turn up','lit','fire','pop','hit','chart','radio','stream','gold','plat','tour','deal','sign','boss','star'],
};
let wordFlowState = null;

function startWordFlow(mode){
  // mode: 'studio' or 'venue'
  const vibes = ['hard','alt-RnB','commercial'];
  // Show vibe picker
  const choices = vibes.map(v=>({
    text: v.charAt(0).toUpperCase()+v.slice(1),
    effect:()=>{ launchWordFlow(v, mode); },
    response:null
  }));
  choiceDialog = {
    name: mode==='studio'?'PICK YOUR VIBE':'CHOOSE YOUR FLOW',
    lines: [mode==='studio'?'What sound we going for?':'How you wanna rock the crowd?'],
    choices, selectedIndex:0
  };
}

function launchWordFlow(vibe, mode){
  const words = FLOW_WORDS[vibe];
  const stanzas = mode==='venue'?4:1;
  const barsPerStanza = 4;
  const totalBeats = stanzas * barsPerStanza;
  const prompts = [];
  const beatInterval = 1200; // ms per beat

  for(let i=0;i<totalBeats;i++){
    const word = words[Math.floor(Math.random()*words.length)];
    const lane = Math.floor(Math.random()*4)+1; // 1-4 keys
    prompts.push({
      word, lane, time:2000+i*beatInterval,
      hit:false, missed:false, accuracy:0
    });
  }

  wordFlowState = {
    mode, vibe, prompts, startTime:performance.now(),
    hits:0, misses:0, done:false, showResult:false, resultTimer:0,
    crowdEnergy:50, // venue only, 0-100
    currentStanza:0, totalStanzas:stanzas,
    beatPhase:0, // for visual beat sync
    screenFlash:0, combo:0, maxCombo:0,
  };

  gameScene = 'wordflow';
  state.gameScene = 'wordflow';

  // Start beat audio
  startBeatLoop(vibe);
}

let beatLoopInterval = null;
function startBeatLoop(vibe){
  if(beatLoopInterval) clearInterval(beatLoopInterval);
  const bpm = vibe==='hard'?140:vibe==='alt-RnB'?90:120;
  const interval = 60000/bpm;
  let beatCount = 0;
  beatLoopInterval = setInterval(()=>{
    beatCount++;
    if(wordFlowState) wordFlowState.beatPhase = (wordFlowState.beatPhase+1)%4;
    // Kick on 1,3 snare on 2,4
    if(beatCount%2===1) playTone(60,0.15,'sine',0.1);
    else playTone(200,0.06,'sawtooth',0.06);
    // Hi-hat
    playTone(8000,0.02,'square',0.02);
  }, interval);
}
function stopBeatLoop(){if(beatLoopInterval){clearInterval(beatLoopInterval);beatLoopInterval=null;}}

function checkWordFlowHit(key){
  if(!wordFlowState||wordFlowState.done) return;
  const keyNum = parseInt(key);
  if(keyNum<1||keyNum>4) return;

  const now = performance.now()-wordFlowState.startTime;
  const scrollSpeed = 0.18;
  const targetY = canvas.height*0.7;
  let hit = false;

  for(const p of wordFlowState.prompts){
    if(p.hit||p.missed) continue;
    const py = (now-p.time)*scrollSpeed;
    const dist = Math.abs(py - targetY + 40);
    if(dist<60 && p.lane===keyNum){
      p.hit = true;
      p.accuracy = dist<20?1.0:dist<40?0.7:0.5;
      wordFlowState.hits++;
      wordFlowState.combo++;
      wordFlowState.maxCombo = Math.max(wordFlowState.maxCombo, wordFlowState.combo);
      if(wordFlowState.mode==='venue') wordFlowState.crowdEnergy = Math.min(100, wordFlowState.crowdEnergy+5);
      wordFlowState.screenFlash = 8;
      sfxHit();
      hit = true;
      break;
    }
  }
  if(!hit){
    wordFlowState.misses++;
    wordFlowState.combo = 0;
    if(wordFlowState.mode==='venue') wordFlowState.crowdEnergy = Math.max(0, wordFlowState.crowdEnergy-8);
    sfxMiss();
  }
}

function updateWordFlow(){
  if(!wordFlowState||wordFlowState.done) return;
  const now = performance.now()-wordFlowState.startTime;
  const scrollSpeed = 0.18;
  const targetY = canvas.height*0.7;

  for(const p of wordFlowState.prompts){
    if(!p.hit&&!p.missed&&(now-p.time)*scrollSpeed>targetY+120){
      p.missed=true; wordFlowState.misses++;
      wordFlowState.combo=0;
      if(wordFlowState.mode==='venue') wordFlowState.crowdEnergy = Math.max(0, wordFlowState.crowdEnergy-5);
    }
  }

  // Venue crowd energy decay
  if(wordFlowState.mode==='venue'){
    wordFlowState.crowdEnergy = Math.max(0, wordFlowState.crowdEnergy - 0.02);
  }

  if(wordFlowState.screenFlash>0) wordFlowState.screenFlash--;

  if(wordFlowState.prompts.every(p=>p.hit||p.missed)&&!wordFlowState.showResult){
    wordFlowState.done=true;
    wordFlowState.showResult=true;
    wordFlowState.resultTimer=0;
    stopBeatLoop();

    const total = wordFlowState.prompts.length;
    const accuracyPct = Math.round((wordFlowState.hits/total)*100);
    const avgAccuracy = wordFlowState.prompts.filter(p=>p.hit).reduce((s,p)=>s+p.accuracy,0)/(wordFlowState.hits||1);

    if(wordFlowState.mode==='ar_pitch'){
      // A&R pitch — need 80%+
      if(accuracyPct>=80){
        wordFlowState.grade='SIGNED';wordFlowState.qualStr='The label wants you!';
        arPitchActive=false;
        // Show label choice after result dismiss
        wordFlowState.pitchWon=true;
      } else {
        wordFlowState.grade='REJECTED';wordFlowState.qualStr='Not ready yet.';
        arPitchActive=false;
        state.arCooldownDay=state.day+3;
        wordFlowState.pitchWon=false;
      }
    } else if(wordFlowState.mode==='studio'){
      // Track studio day for A&R deal check
      state.lastStudioDay=state.day;
      // Muse bonus
      const museBonus=state.museId?10:0;
      // Quality grade
      const rawScore = accuracyPct * avgAccuracy + museBonus;
      let grade='D',qualStr='rough';
      if(rawScore>=90){grade='S';qualStr='legendary';}
      else if(rawScore>=75){grade='A';qualStr='fire';}
      else if(rawScore>=55){grade='B';qualStr='solid';}
      else if(rawScore>=35){grade='C';qualStr='decent';}
      wordFlowState.grade = grade;
      wordFlowState.qualStr = qualStr;
      // Save track
      if(!state.tracksArray) state.tracksArray=[];
      const trackNames=['Hustle Mode','Stack Dreams','Ice Flow','Mic Check','No Cap','Real Talk','Street Psalm','Gold Chain','Night Shift','Trap Star','Midnight Run','Crown Talk','Gutter Rose','Velvet Chains','Broke Clock'];
      const tName = trackNames[Math.floor(Math.random()*trackNames.length)];
      state.tracksArray.push({id:Date.now(),name:tName,vibe:wordFlowState.vibe,quality:grade,day:state.day});
      state.tracks = (state.tracks||0)+1;
      state.skill += grade==='S'?15:grade==='A'?10:grade==='B'?7:grade==='C'?4:2;
      state.fame += grade==='S'?20:grade==='A'?15:grade==='B'?10:grade==='C'?5:2;
      state.money -= 200;
      state.energy -= 25;
      sfxWin();
    } else {
      // Venue scoring
      const crowdFinal = wordFlowState.crowdEnergy;
      // Drip + rap group bonus
      const dripMult=1+(state.drip||0)*0.01;
      const rapGroupBonus=(state.rapRecruits||[]).length*3;
      const girlBonus=state.mainGirl?5:0;
      const adjustedAccuracy=Math.min(100,accuracyPct*dripMult+rapGroupBonus+girlBonus);
      const score = Math.round(crowdFinal*0.6 + adjustedAccuracy*0.4);
      wordFlowState.venueScore = score;
      if(score>=70){
        state.fame+=30;state.cred+=15;state.money+=500;state.battles_won++;
        state.venueWins=(state.venueWins||0)+1;addBuzz(5);sfxWin();
      } else if(score>=40){
        state.fame+=10;
      } else {
        state.fame=Math.max(0,state.fame-10);state.cred=Math.max(0,state.cred-5);state.battles_lost++;sfxLose();
      }
      state.energy -= 20;
    }
    clampState();saveState();
  }
}

function drawWordFlow(){
  const w=canvas.width, h=canvas.height;
  const wf = wordFlowState;

  // Background color shifts based on crowd energy (venue) or vibe (studio)
  let bgR=8,bgG=6,bgB=15;
  if(wf.mode==='venue'&&!wf.done){
    const e=wf.crowdEnergy/100;
    bgR=8+Math.floor(e*30); bgG=6; bgB=15+Math.floor(e*20);
  }
  ctx.fillStyle=`rgb(${bgR},${bgG},${bgB})`;
  ctx.fillRect(0,0,w,h);

  // Screen flash
  if(wf.screenFlash>0){
    ctx.fillStyle=`rgba(255,200,50,${wf.screenFlash*0.04})`;
    ctx.fillRect(0,0,w,h);
  }

  // Beat pulse bg
  if(wf.beatPhase%2===0&&!wf.done){
    ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(0,0,w,h);
  }

  // Title
  ctx.fillStyle=PAL.gold;ctx.font='bold 22px "Bebas Neue"';ctx.textAlign='center';
  ctx.fillText(wf.mode==='studio'?'RECORDING SESSION':'FREESTYLE BATTLE',w/2,30);

  // Vibe label
  ctx.font='11px Inter';ctx.fillStyle=wf.vibe==='hard'?'#e63946':wf.vibe==='alt-RnB'?'#7b4daa':'#ffc832';
  ctx.fillText(wf.vibe.toUpperCase(),w/2,48);

  // Lane labels
  const laneW = 80;
  const laneX = [w/2-laneW*1.5, w/2-laneW*0.5, w/2+laneW*0.5, w/2+laneW*1.5];
  const targetY = h*0.7;

  // Hit zone
  ctx.fillStyle='rgba(255,200,50,0.08)';
  ctx.fillRect(laneX[0]-35,targetY-25,laneW*4-10,50);
  ctx.strokeStyle='rgba(255,200,50,0.25)';ctx.lineWidth=1;
  ctx.strokeRect(laneX[0]-35,targetY-25,laneW*4-10,50);

  // Lane numbers
  for(let i=0;i<4;i++){
    ctx.fillStyle='rgba(255,200,50,0.2)';ctx.font='bold 18px Inter';ctx.textAlign='center';
    ctx.fillText(''+(i+1),laneX[i],targetY+8);
  }

  // Words scrolling
  const now=performance.now()-wf.startTime;
  const scrollSpeed=0.18;
  for(const p of wf.prompts){
    if(p.hit||p.missed) continue;
    const py=(now-p.time)*scrollSpeed;
    if(py<-40||py>h+40) continue;
    const lx=laneX[p.lane-1];
    const dist=Math.abs(py-targetY+40);
    const glow=dist<30?1.0:dist<60?0.7:0.4;

    // Word bubble
    ctx.font='bold 14px Inter';
    const tw=ctx.measureText(p.word).width+16;
    const bobY = Math.sin(now*0.003+p.lane)*3; // bob to beat

    ctx.fillStyle=`rgba(255,200,50,${glow*0.15})`;
    ctx.fillRect(lx-tw/2,py-12+bobY,tw,24);

    ctx.fillStyle=`rgba(255,200,50,${glow})`;
    ctx.textAlign='center';
    ctx.fillText(p.word,lx,py+5+bobY);
  }

  // Combo display
  if(wf.combo>=3){
    ctx.fillStyle=PAL.gold;ctx.font='bold 16px Inter';ctx.textAlign='right';
    ctx.fillText('COMBO x'+wf.combo,w-20,80);
  }

  // Hits/Misses
  ctx.font='11px Inter';ctx.textAlign='left';
  ctx.fillStyle=PAL.green;ctx.fillText('Hits: '+wf.hits,15,30);
  ctx.fillStyle=PAL.accent;ctx.fillText('Miss: '+wf.misses,15,46);

  // Venue-specific: crowd energy meter + crowd faces
  if(wf.mode==='venue'){
    // Energy bar
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(15,60,120,10);
    const eColor = wf.crowdEnergy>70?PAL.green:wf.crowdEnergy>40?PAL.gold:PAL.accent;
    ctx.fillStyle=eColor;ctx.fillRect(15,60,120*(wf.crowdEnergy/100),10);
    ctx.font='9px Inter';ctx.fillStyle=PAL.white;ctx.fillText('CROWD',15,84);

    // Crowd faces at bottom
    for(let i=0;i<12;i++){
      const cx=w*0.1+i*(w*0.07);
      const cy=h*0.88+Math.sin(now*0.004+i)*4;
      const happy = wf.crowdEnergy>50;
      ctx.font='16px sans-serif';ctx.textAlign='center';
      ctx.fillText(happy?(wf.combo>=5?'🤩':'😊'):'😐',cx,cy);
    }
  }

  // Controls hint
  ctx.font='10px Inter';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.textAlign='center';
  ctx.fillText('Press 1-2-3-4 when words hit the zone',w/2,h-12);

  // Results overlay
  if(wf.showResult){
    wf.resultTimer++;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,w,h);
    ctx.textAlign='center';

    if(wf.mode==='ar_pitch'){
      ctx.fillStyle=wf.pitchWon?PAL.gold:PAL.accent;ctx.font='bold 36px "Bebas Neue"';
      ctx.fillText(wf.pitchWon?'LABEL WANTS YOU!':'NOT READY',w/2,h/2-50);
      ctx.font='16px Inter';ctx.fillStyle=PAL.white;
      ctx.fillText(wf.qualStr,w/2,h/2-15);
      ctx.font='13px Inter';ctx.fillStyle=wf.pitchWon?PAL.green:PAL.accent;
      ctx.fillText(wf.pitchWon?'Choose your label...':'Come back in 3 days.',w/2,h/2+15);
    } else if(wf.mode==='studio'){
      ctx.fillStyle=PAL.gold;ctx.font='bold 36px "Bebas Neue"';
      ctx.fillText('GRADE: '+wf.grade,w/2,h/2-50);
      ctx.font='16px Inter';ctx.fillStyle=PAL.white;
      ctx.fillText('"'+state.tracksArray[state.tracksArray.length-1].name+'" - '+wf.qualStr,w/2,h/2-15);
      ctx.font='13px Inter';ctx.fillStyle=PAL.green;
      const sk=wf.grade==='S'?15:wf.grade==='A'?10:wf.grade==='B'?7:wf.grade==='C'?4:2;
      const fm=wf.grade==='S'?20:wf.grade==='A'?15:wf.grade==='B'?10:wf.grade==='C'?5:2;
      ctx.fillText('SKILL +'+sk+' | FAME +'+fm+' | -$200',w/2,h/2+15);
    } else {
      const score = wf.venueScore;
      const won = score>=70;
      ctx.fillStyle=won?PAL.gold:score>=40?PAL.warmGlow:PAL.accent;
      ctx.font='bold 36px "Bebas Neue"';
      ctx.fillText(won?'CROWD WENT CRAZY!':score>=40?'DECENT SET':'TOUGH CROWD',w/2,h/2-50);
      ctx.font='16px Inter';ctx.fillStyle=PAL.white;
      ctx.fillText('Score: '+score+'%  |  Crowd Energy: '+Math.round(wf.crowdEnergy)+'%',w/2,h/2-15);
      ctx.font='13px Inter';
      if(won){ctx.fillStyle=PAL.green;ctx.fillText('FAME +30 | CRED +15 | +$500',w/2,h/2+15);}
      else if(score>=40){ctx.fillStyle=PAL.warmGlow;ctx.fillText('FAME +10',w/2,h/2+15);}
      else{ctx.fillStyle=PAL.accent;ctx.fillText('FAME -10 | CRED -5',w/2,h/2+15);}
    }
    ctx.font='12px Inter';ctx.fillStyle=PAL.white;ctx.fillText('SPACE to continue',w/2,h/2+55);
    if(wf.resultTimer>30&&(keys[' ']||keys['Enter'])){
      const pitchWon=wf.pitchWon;const wasARPitch=wf.mode==='ar_pitch';
      wordFlowState=null;
      if(wasARPitch){
        if(pitchWon){
          // Show label choice
          gameScene='interior';state.gameScene='interior';
          setTimeout(()=>showLabelChoice(),100);
        } else {
          if(currentInterior){gameScene='interior';state.gameScene='interior';}
          else{gameScene='overworld';state.gameScene='overworld';}
        }
      } else if(wf.mode==='studio'&&currentInterior){
        gameScene='interior';state.gameScene='interior';
      } else {
        gameScene='overworld';state.gameScene='overworld';
      }
    }
  }
}

const buildingAmbientNPCs = [];
const AMBIENT_BUILDINGS = ['openmic','radio','church','mosque','gym','hospital','manager','trap','hotel','pawnshop','luxcrib','hwstudio','dealership'];
let lastAmbientSpawn = 0;

function spawnBuildingAmbientNPC(){
  if(buildingAmbientNPCs.length>=8) return;
  const bid = AMBIENT_BUILDINGS[Math.floor(Math.random()*AMBIENT_BUILDINGS.length)];
  const b = buildings.find(bb=>bb.id===bid);
  if(!b) return;
  const entering = Math.random()>0.5;
  const offX = (Math.random()>0.5?1:-1) * (3+Math.floor(Math.random()*4));
  const offY = 3+Math.floor(Math.random()*3);
  const spawnX = entering ? b.doorX + offX : b.doorX;
  const spawnY = entering ? b.doorY + offY : b.doorY;
  const targetX = entering ? b.doorX : b.doorX + offX;
  const targetY = entering ? b.doorY : b.doorY + offY;
  buildingAmbientNPCs.push({
    x:spawnX, y:spawnY, targetX, targetY, entering,
    color:AMB_COLORS[Math.floor(Math.random()*AMB_COLORS.length)],
    walkFrame:0, facing:'down', moveTimer:0, alive:true, buildingId:bid,
  });
}

function updateBuildingAmbientNPCs(){
  // Spawn new ones periodically
  if(gameTime-lastAmbientSpawn > 180+Math.random()*180){
    lastAmbientSpawn = gameTime;
    spawnBuildingAmbientNPC();
  }
  for(const a of buildingAmbientNPCs){
    a.moveTimer++;
    if(a.moveTimer>30){
      a.moveTimer=0;
      const dx=Math.sign(a.targetX-a.x), dy=Math.sign(a.targetY-a.y);
      if(dx||dy){
        const nx=a.x+dx, ny=a.y+dy;
        if(!isBlocked(nx,ny)&&nx>=0&&ny>=0&&nx<MAP_W&&ny<MAP_H){
          a.x=nx; a.y=ny;
          a.walkFrame=(a.walkFrame+1)%8;
          if(dx<0)a.facing='left';else if(dx>0)a.facing='right';
          else if(dy<0)a.facing='up';else a.facing='down';
        } else {
          a.alive=false; // blocked, despawn
        }
      } else {
        a.alive=false; // reached target, despawn
      }
    }
  }
  // Cull dead + off-screen
  for(let i=buildingAmbientNPCs.length-1;i>=0;i--){
    if(!buildingAmbientNPCs[i].alive) buildingAmbientNPCs.splice(i,1);
  }
}

// ========== COLLISION ==========
function isBlocked(tx,ty){
  if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H) return true;
  for(const b of buildings){if(tx>=b.x&&tx<b.x+b.w&&ty>=b.y&&ty<b.y+b.h) return true;}
  return false;
}

window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(e.key===' '||e.key==='Enter'||e.key==='e'||e.key==='E') handleAction();
  if(e.key==='Tab'){e.preventDefault();
    if(!showCareerStats&&!showChartsPanel){showCareerStats=true;}
    else if(showCareerStats){showCareerStats=false;showChartsPanel=true;}
    else{showChartsPanel=false;}
    sfxBlip();}
  if((e.key==='m'||e.key==='M')&&(gameScene==='overworld'||gameScene==='interior')){showFullMap=!showFullMap;sfxBlip();}
  // Car toggle
  if((e.key==='v'||e.key==='V')&&gameScene==='overworld'&&!dialog&&!choiceDialog){
    if(isDriving){exitCar();sfxDoor();}
    else if(state.currentCar){
      const cp=getCarParkTile();
      if(Math.abs(state.px-cp.x)<=1&&Math.abs(state.py-cp.y)<=1){enterCar();sfxDoor();}
      else{showDialog(['Your car is parked near your crib.']);}
    }
  }
  // Combat keys (overworld only)
  if((e.key==='x'||e.key==='X')&&gameScene==='overworld'&&nearNPC&&!dialog&&!choiceDialog) doSlap();
  if((e.key==='z'||e.key==='Z')&&gameScene==='overworld'&&nearNPC&&!dialog&&!choiceDialog) doShoot();
  // Rob key
  if((e.key==='r'||e.key==='R')&&gameScene==='overworld'&&!dialog&&!choiceDialog&&!rHoldStart) doRob();
  // Safecrack
  if(gameScene==='safecrack'&&safecrackState&&!safecrackState.done&&(e.key===' '||e.key==='Enter')) checkSafeCrackHit();
  if(gameScene==='safecrack'&&safecrackState&&safecrackState.done&&(e.key===' '||e.key==='Enter')){
    safecrackState=null;
    if(currentInterior){gameScene='interior';state.gameScene='interior';}
    else{gameScene='overworld';state.gameScene='overworld';}
  }
  // Word-flow keys 1-4
  if(gameScene==='wordflow'&&wordFlowState&&!wordFlowState.done){
    if(['1','2','3','4'].includes(e.key)) checkWordFlowHit(e.key);
  }
  // Rhythm (legacy, kept for safety)
  if(gameScene==='rhythm'&&rhythmState&&!rhythmState.done){
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) checkRhythmHit(e.key);
  }
  // Choice nav
  if(choiceDialog){
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){choiceDialog.selectedIndex=Math.max(0,choiceDialog.selectedIndex-1);sfxBlip();}
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){choiceDialog.selectedIndex=Math.min(choiceDialog.choices.length-1,choiceDialog.selectedIndex+1);sfxBlip();}
  }
  // Scene escapes
  if(e.key==='Escape'){
    if(gameScene==='venue'){gameScene='overworld';state.gameScene='overworld';}
    if(gameScene==='club'){gameScene='overworld';state.gameScene='overworld';}
  }
  if(gameScene==='venue'&&(e.key===' '||e.key==='Enter')){
    if(state.energy<=0){gameScene='overworld';state.gameScene='overworld';showDialog(['No energy. Go rest.']);return;}
    startWordFlow('venue');
  }
  if(gameScene==='club'&&(e.key===' '||e.key==='Enter')) doClubMingle();
  // Word-flow result dismiss
  if(gameScene==='wordflow'&&wordFlowState&&wordFlowState.done&&wordFlowState.resultTimer>30){
    if(e.key===' '||e.key==='Enter'){
      wordFlowState=null;
      if(currentInterior){gameScene='interior';state.gameScene='interior';}
      else{gameScene='overworld';state.gameScene='overworld';}
    }
  }
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// ========== COMBAT ==========
function doSlap(){
  if(!nearNPC) return;
  sfxSlap();
  state.screenShake = 10;
  const npc = nearNPC;
  spawnFloatingText(npc.x*TILE, npc.y*TILE-30, 'WHAM!', PAL.orange);
  spawnDustCloud(npc.x*TILE, npc.y*TILE);

  // Consequences based on NPC type
  if(npc.id==='hater'){
    state.cred+=8;
    showDialog(['You slapped The Hater!','Crowd went wild.','CRED +8']);
  } else if(npc.id==='fan'){
    state.cred-=10; state.fame-=5;
    showDialog(['You slapped a fan?!','Not cool. CRED -10, FAME -5']);
  } else if(npc.gang){
    state.cred-=5; state.heat+=5;
    const g = GANGS[npc.gang];
    showDialog(['You slapped '+npc.name+'!','The '+g.name+' won\'t forget this.','CRED -5, HEAT +5']);
  } else {
    state.cred+=3;
    showDialog(['You slapped '+npc.name+'!','Bold move. CRED +3']);
  }
  clampState();saveState();
}

function doShoot(){
  if(!nearNPC) return;
  if(!state.hasGun){showDialog(['You don\'t have a piece.','Hit the gun store first.']);return;}
  sfxGunshot();
  state.screenShake = 20;
  const npc = nearNPC;
  spawnFloatingText(npc.x*TILE, npc.y*TILE-30, 'BANG!', PAL.accent);

  // NPC goes away for 3 days
  state.npcDead[npc.id] = state.day;
  state.heat += 30;
  state.wanted = Math.min(5, state.wanted + 2);

  if(npc.id==='hater'){
    state.cred+=15; state.fame+=5;
    showDialog(['The Hater won\'t be talking for a while.','CRED +15, FAME +5','HEAT +30. Lay low.']);
  } else if(npc.id==='fan'){
    state.cred-=30; state.fame-=20;
    showDialog(['You shot a FAN?!','Career suicide.','CRED -30, FAME -20, HEAT +30']);
  } else {
    state.cred+=5;
    showDialog([npc.name+' is down.','Won\'t see them for a few days.','CRED +5, HEAT +30']);
  }
  clampState();saveState();
}

// ========== MOVEMENT ==========
function tryMove(dx,dy){
  if(dialog||choiceDialog||gameScene!=='overworld'||showFullMap||(interiorTransition&&interiorTransition.type!=='fadein')) return;
  const nx=state.px+dx, ny=state.py+dy;
  if(!isDriving){
    for(const n of npcs){if(n.x===nx&&n.y===ny&&!state.npcDead[n.id]) return;}
    for(const a of ambientNPCs){if(a.x===nx&&a.y===ny) return;}
  }
  if(!isBlocked(nx,ny)){
    state.px=nx; state.py=ny;
    walkFrame=(walkFrame+1)%8;
    // Car exhaust particles
    if(isDriving&&state.currentCar&&gameTime%3===0) spawnExhaustPuff(state.px*TILE,state.py*TILE,facing);
    // Driving NPC cred notifications
    if(isDriving&&state.currentCar){
      const cd=getCarDef(state.currentCar);
      if(cd&&cd.credBonus>0){carNpcNotifTimer++;
        if(carNpcNotifTimer>40){carNpcNotifTimer=0;
          for(const n of ambientNPCs){
            if(Math.abs(n.x-state.px)<=3&&Math.abs(n.y-state.py)<=3&&Math.random()<0.3){
              state.cred=Math.min(100,state.cred+cd.credBonus);
              spawnFloatingText(n.x*TILE,n.y*TILE-30,'yo that whip clean!',PAL.gold);break;
            }}}}
    }
    // Heavy rain energy drain
    if(state.weatherState==='heavy_rain'&&!isDriving&&gameTime%60===0) state.energy=Math.max(0,state.energy-1);
    // Random cop stop (not while driving)
    if(!isDriving&&state.heat>30&&Math.random()<0.015*(state.heat/50)) triggerCopStop();
    if(!isDriving&&Math.random()<0.003&&state.hasGun){
      state.cred+=5;
      spawnFloatingText(state.px*TILE,state.py*TILE-30,'Hater backed down! CRED +5',PAL.gold);
    }
  } else if(isDriving){
    // Collision with building = screen shake + damage
    state.screenShake=8;
    if(!state.carDamage[state.currentCar])state.carDamage[state.currentCar]=0;
    state.carDamage[state.currentCar]+=5;
    spawnFloatingText(state.px*TILE,state.py*TILE-30,'CRASH! -5 HP',PAL.accent);
    sfxSlap();
  }
  if(dx<0)facing='left';if(dx>0)facing='right';
  if(dy<0)facing='up';if(dy>0)facing='down';
}

// Interior movement
function tryMoveInterior(dx,dy){
  if(!currentInterior||dialog||choiceDialog||showFullMap||(interiorTransition&&interiorTransition.type!=='fadein')) return;
  const ci = currentInterior;
  const nx=ci.playerX+dx, ny=ci.playerY+dy;
  if(nx<0||ny<0||nx>=ci.def.w||ny>=ci.def.h) return;
  const tile = ci.def.tiles[ny][nx];
  if(tile===1) return; // wall
  // Check NPC collision
  for(const n of ci.npcs){if(n.x===nx&&n.y===ny) return;}
  ci.playerX=nx; ci.playerY=ny;
  walkFrame=(walkFrame+1)%8;
  if(dx<0)ci.facing='left';if(dx>0)ci.facing='right';
  if(dy<0)ci.facing='up';if(dy>0)ci.facing='down';
  facing=ci.facing;

  // Check exit door
  if(tile===2){
    exitInterior();
  }
  // Check special tile interaction hint
  if(tile===3){
    // Will show prompt
  }
}

function handleMovement(now){
  const delay=isDriving?driveMoveDelay:MOVE_DELAY;
  if(now-lastMove<delay) return;
  let moved=false;
  if(gameScene==='interior'){
    if(keys['ArrowUp']||keys['w']||keys['W']){tryMoveInterior(0,-1);moved=true;}
    else if(keys['ArrowDown']||keys['s']||keys['S']){tryMoveInterior(0,1);moved=true;}
    else if(keys['ArrowLeft']||keys['a']||keys['A']){tryMoveInterior(-1,0);moved=true;}
    else if(keys['ArrowRight']||keys['d']||keys['D']){tryMoveInterior(1,0);moved=true;}
  } else {
    if(keys['ArrowUp']||keys['w']||keys['W']){tryMove(0,-1);moved=true;}
    else if(keys['ArrowDown']||keys['s']||keys['S']){tryMove(0,1);moved=true;}
    else if(keys['ArrowLeft']||keys['a']||keys['A']){tryMove(-1,0);moved=true;}
    else if(keys['ArrowRight']||keys['d']||keys['D']){tryMove(1,0);moved=true;}
  }
  if(moved) lastMove=now;
}

// ========== ACTION ==========
function handleAction(){
  if(choiceDialog){
    const c=choiceDialog.choices[choiceDialog.selectedIndex];
    if(c.effect)c.effect();
    sfxBlip(); choiceDialog=null;
    if(c.response) dialog={lines:[c.response],callback:null};
    clampState();saveState();return;
  }
  if(dialog){if(dialog.callback)dialog.callback();dialog=null;sfxBlip();saveState();return;}
  if(showFullMap){showFullMap=false;return;}

  // Interior action
  if(gameScene==='interior'&&currentInterior){
    // Check for nearby interior NPC
    if(nearInteriorNPC&&nearInteriorNPC.lines&&nearInteriorNPC.lines.length>0){
      sfxBlip();
      // Special NPC handlers
      const npcCmd = nearInteriorNPC.lines[0];
      if(npcCmd==='CLUB_MINGLE'){
        if(state.clubCooldown>0){showDialog(['Bouncer: You already had your fun tonight.']);return;}
        if(state.money<200){showDialog(['$200 cover for VIP. You\'re short.']);return;}
        doClubMingle();return;
      }
      if(npcCmd==='GUN_STORE'){doGunStore();return;}
      if(npcCmd==='POLICE_STATION'){doPoliceStation();return;}
      if(npcCmd==='CHURCH_PRAY'){
        state.energy=Math.min(100,state.energy+50);state.karma+=10;state.cred=Math.max(0,state.cred-5);
        sfxBlip();spawnFloatingText(state.px*TILE,state.py*TILE-30,'Peace. ENERGY +50',PAL.green);
        showDialog(['Peace washes over you.','ENERGY +50 | CRED -5 | KARMA +10']);clampState();saveState();return;
      }
      if(npcCmd==='MOSQUE_PRAY'){
        state.energy=Math.min(100,state.energy+50);state.karma+=10;state.cred=Math.max(0,state.cred-5);
        sfxBlip();spawnFloatingText(state.px*TILE,state.py*TILE-30,'Inner peace. ENERGY +50',PAL.green);
        showDialog(['You find inner peace.','ENERGY +50 | CRED -5 | KARMA +10']);clampState();saveState();return;
      }
      if(npcCmd==='GYM_TRAIN'){
        if(state.energy<20){showDialog(['Too tired. Rest first.']);return;}
        state.energy-=20;state.skill+=5;state.cred=Math.min(100,state.cred+3);
        sfxBlip();spawnFloatingText(state.px*TILE,state.py*TILE-30,'GAINS! SKILL +5',PAL.blue);
        showDialog(['Iron therapy.','SKILL +5 | CRED +3 | ENERGY -20']);clampState();saveState();return;
      }
      if(npcCmd==='HOSPITAL_HEAL'){
        if(state.money<500){showDialog(['Treatment costs $500. You\'re short.']);return;}
        state.money-=500;state.energy=100;state.cred=Math.min(100,state.cred+3);
        sfxBlip();spawnFloatingText(state.px*TILE,state.py*TILE-30,'Healed! ENERGY 100',PAL.green);
        showDialog(['Patched up.','ENERGY 100 | CRED +3 | -$500']);clampState();saveState();return;
      }
      if(npcCmd==='TRAP_INVEST'){doTrapHouse();return;}
      if(npcCmd==='PLUG_BUY'){doPlug();return;}
      if(npcCmd==='DEALER_TALK'){
        if(state.currentCar&&(state.carDamage[state.currentCar]||0)>0){
          const dmg=state.carDamage[state.currentCar];const cost=Math.ceil(dmg/5)*50;
          choiceDialog={name:'DEALERSHIP',lines:['Your '+getCarDef(state.currentCar).name+' has '+dmg+' damage.','Repair for $'+cost+'?'],
            choices:[{text:'Repair ($'+cost+')',effect:()=>{if(state.money>=cost){state.money-=cost;state.carDamage[state.currentCar]=0;sfxCash();}},
              response:state.money>=cost?'Good as new!':'Need $'+cost+'.'},
              {text:'Browse cars',effect:()=>{},response:'Walk up to any car and press E.'},
            ],selectedIndex:0};
        } else {showDialog(['Welcome to the lot!','Walk up to any car and press E.']);}
        return;
      }
      // A&R office pitch
      if(npcCmd==='AR_PITCH'){startARPitch();return;}
      // Mall clerks
      if(npcCmd==='DRIP_STORE'||nearInteriorNPC.id==='drip_clerk'){openDripStore();return;}
      if(npcCmd==='JEWELRY_STORE'||nearInteriorNPC.id==='jewel_clerk'){openJewelryStore(true);return;}
      if(npcCmd==='ACCESSORY_STORE'||nearInteriorNPC.id==='misc_clerk'){openAccessoryStore();return;}
      // Pawn shop
      if(npcCmd==='PAWN_SHOP'||nearInteriorNPC.id==='pawnclerk'){openJewelryStore(false);return;}
      // Hotel clerk
      if(npcCmd==='HOTEL_ROOM'||nearInteriorNPC.id==='deskclerk'){doHotelRoom();return;}
      // Groupies
      if(nearInteriorNPC.id==='groupie1'||nearInteriorNPC.id==='groupie2'){doGroupieFlirt(nearInteriorNPC);return;}
      // Lieutenant gang missions
      if(nearInteriorNPC.id==='lieutenant'){
        if(!state.gang){showDialog(['You\'re not affiliated.','Join a gang first.']);}

          const rankIdx=getGangRankIdx();
          choiceDialog={name:'Lieutenant',

              },response:null},

              {text:'Leave',effect:()=>{},response:''},

        }

      }

      return;

    // Pawn shop safe

      for(const[dx,dy] of dirs2){
        const ax=ci.playerX+dx, ay=ci.playerY+dy;
        if(ax===11&&ay===2){// safe tile
          if(state.pawnSafeRobbed){showDialog(['Safe is already empty.']);return;}
          choiceDialog={name:'BACK ROOM SAFE',
            lines:['Heavy steel safe. Combination lock.'],
            choices:[
              {text:'Crack it (R to rob)',effect:()=>{startSafeCrack();},response:null},
              {text:'Leave it',effect:()=>{},response:'Smart. Maybe.'},
            ],selectedIndex:0};
          return;
        }
      }
    }
    // Home: house party option
    if(ci.buildingId==='home'||ci.buildingId==='luxcrib'){
      const tile2=ci.def.tiles[ci.playerY][ci.playerX];
      if(tile2===3){
        choiceDialog={name:ci.buildingId==='luxcrib'?'LUXURY CRIB':'YOUR CRIB',
          lines:['What do you want to do?'],
          choices:[
            {text:'Sleep / Save',effect:()=>{doHome();},response:null},
            {text:'Throw House Party',effect:()=>{throwHouseParty();},response:null},
          ],selectedIndex:0};
        return;
      }
    }
    // Check special tile under player
    const tile=ci.def.tiles[ci.playerY][ci.playerX];
    if(tile===3){
      handleInteriorSpecialTile(ci.buildingId, ci.playerX, ci.playerY);
      return;
    }
    // Check adjacent special tiles
    const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
    for(const[dx,dy] of dirs){
      const ax=ci.playerX+dx, ay=ci.playerY+dy;
      if(ax>=0&&ay>=0&&ax<ci.def.w&&ay<ci.def.h){
        if(ci.def.tiles[ay][ax]===3){
          handleInteriorSpecialTile(ci.buildingId, ax, ay);
          return;
        }
      }
    }
    return;
  }

  // Women NPC interaction
  if(gameScene==='overworld'&&!nearNPC){
    const nw=getNearWoman();
    if(nw){talkToWoman(nw);return;}
  }
  if(nearNPC&&gameScene==='overworld'){
    // Offer recruit for friendly non-gang-leader, non-special NPCs
    if(nearNPC.id==='fan'||nearNPC.id==='veteran'||nearNPC.id==='dj_echo'){
      choiceDialog={name:nearNPC.name,lines:['What\'s up?'],
        choices:[
          {text:'Talk',effect:()=>{talkToNPC(nearNPC);},response:null},
          {text:'Recruit',effect:()=>{offerRecruit(nearNPC);},response:null},
        ],selectedIndex:0};
      return;
    }
    talkToNPC(nearNPC);return;
  }
  if(nearBuilding&&gameScene==='overworld'){sfxDoor();enterBuilding(nearBuilding);}
}

function handleInteriorSpecialTile(buildingId, tx, ty){
  sfxBlip();
  if(buildingId==='studio'||buildingId==='hwstudio'){
    if(state.money<200){showDialog(['Studio session costs $200.','Need $'+(200-state.money)+' more.']);return;}

      choices:[
        {text:'Buy ($'+carDef.price.toLocaleString()+')',effect:()=>{
          if(state.money>=carDef.price){state.money-=carDef.price;state.ownedCars.push(carDef.id);state.currentCar=carDef.id;
            if(!state.carDamage[carDef.id])state.carDamage[carDef.id]=0;
            sfxCash();spawnFloatingText(state.px*TILE,state.py*TILE-30,'NEW WHIP!',PAL.gold);}
        },response:state.money>=carDef.price?'Keys are yours! Parked at your crib. Press V near it.':'Need $'+carDef.price.toLocaleString()+'.'},
        {text:'Nah',effect:()=>{},response:'Come back when you\'re ready.'},
      ],selectedIndex:0};
  } else if(buildingId==='church'){
    state.energy=Math.min(100,state.energy+50);state.karma+=10;state.cred=Math.max(0,state.cred-5);
    showDialog(['Peace washes over you.','ENERGY +50 | CRED -5 | KARMA +10']);clampState();saveState();
  } else if(buildingId==='mosque'){
    state.energy=Math.min(100,state.energy+50);state.karma+=10;state.cred=Math.max(0,state.cred-5);
    showDialog(['You find inner peace.','ENERGY +50 | CRED -5 | KARMA +10']);clampState();saveState();
  } else if(buildingId==='gym'){
    if(state.energy<20){showDialog(['Too tired. Rest first.']);return;}
    state.energy-=20;state.skill+=5;state.cred=Math.min(100,state.cred+3);
    showDialog(['Iron therapy.','SKILL +5 | CRED +3 | ENERGY -20']);clampState();saveState();
  } else if(buildingId==='hospital'){
    if(state.money<500){showDialog(['Treatment costs $500.']);return;}
    state.money-=500;state.energy=100;state.cred=Math.min(100,state.cred+3);
    showDialog(['Patched up.','ENERGY 100 | CRED +3 | -$500']);clampState();saveState();
  }
}

function checkProximity(){
  nearBuilding=null;nearNPC=null;nearInteriorNPC=null;showingPrompt=false;

  if(gameScene==='interior'&&currentInterior){
    // Interior NPC proximity
    const ci=currentInterior;
    for(const npc of ci.npcs){
      if(!npc.name) continue; // skip unnamed dancers/crowd
      const dx=Math.abs(ci.playerX-npc.x),dy=Math.abs(ci.playerY-npc.y);
      if(dx+dy<=1&&dx+dy>0){nearInteriorNPC=npc;showingPrompt=true;}
    }
    // Special tile proximity
    const tile=ci.def.tiles[ci.playerY]?.[ci.playerX];
    if(tile===3) showingPrompt=true;
    // Adjacent special tiles
    const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
    for(const[dx,dy] of dirs){
      const ax=ci.playerX+dx, ay=ci.playerY+dy;
      if(ax>=0&&ay>=0&&ax<ci.def.w&&ay<ci.def.h){
        if(ci.def.tiles[ay][ax]===3) showingPrompt=true;
      }
    }
    return;
  }

  for(const b of buildings){if(state.px===b.doorX&&state.py===b.doorY){nearBuilding=b;showingPrompt=true;}}
  // Car proximity
  if(state.currentCar&&!isDriving){
    const cp=getCarParkTile();
    if(Math.abs(state.px-cp.x)<=1&&Math.abs(state.py-cp.y)<=1)showingPrompt=true;
  }
  for(const npc of npcs){
    if(state.npcDead[npc.id]&&state.day-state.npcDead[npc.id]<3) continue;
    const dx=Math.abs(state.px-npc.x),dy=Math.abs(state.py-npc.y);
    if(dx+dy<=1&&dx+dy>0){nearNPC=npc;showingPrompt=true;}
  }
}

// ========== NPC INTERACTION ==========
function talkToNPC(npc){
  sfxBlip(); npc.timesSpoken++;
  state.npcTalked[npc.id]=(state.npcTalked[npc.id]||0)+1;

  // Traitor foreshadow
  if(npc.id===state.traitorId&&!state.traitorRevealed&&state.karma>15&&state.day>state.traitorDay-5){
    spawnFloatingText(npc.x*TILE,npc.y*TILE-40,'Something feels off...',PAL.neon);
  }

  // Gang leader logic
  if(npc.gang){
    let dialogKey = 'intro';
    if(state.gang===npc.gang) dialogKey='member';
    else if(state.gang&&state.gang!==npc.gang) dialogKey='rival';
    const ds=npc.dialogStates[dialogKey];
    choiceDialog={name:npc.name,lines:ds.lines,choices:ds.choices,selectedIndex:0};
    return;
  }

  // Regular NPC
  let dialogKey = npc.timesSpoken<=1?'intro':'returning';
  // A&R Phase C logic
  if(npc.id==='ar_rep'){
    if(state.signed) dialogKey='signed';
    else if(allARThresholdsMet()) dialogKey='ready';
    else dialogKey='intro';
  }
  // Traitor post-reveal
  if(npc.id===state.traitorId&&state.traitorRevealed){
    choiceDialog={name:npc.name,lines:['...','Look, I can make it right.','$1000 and we\'re square.'],
      choices:[
        {text:'Pay $1000',effect:()=>{if(state.money>=1000){state.money-=1000;state.traitorRevealed='forgiven';}},response:state.money>=1000?'We good. For now.':'You ain\'t got it.'},
        {text:'Nah, we\'re done',effect:()=>{state.cred+=5;},response:'Your funeral. CRED +5 for standing your ground.'},
      ],selectedIndex:0};
    return;
  }
  const ds=npc.dialogStates[dialogKey]||npc.dialogStates.intro;
  choiceDialog={name:npc.name,lines:ds.lines,choices:ds.choices,selectedIndex:0};
}

// ========== NPC PATROL ==========
function updateNPCs(){
  for(const npc of npcs){
    if(state.npcDead[npc.id]&&state.day-state.npcDead[npc.id]<3) continue;
    // Respawn check
    if(state.npcDead[npc.id]&&state.day-state.npcDead[npc.id]>=3) delete state.npcDead[npc.id];
    npc.patrolTimer++;
    if(npc.patrolTimer>60){
      npc.patrolTimer=0;
      const target=npc.patrol[npc.patrolIdx];
      if(target){
        const dx=Math.sign(target.x-npc.x),dy=Math.sign(target.y-npc.y);
        if(dx||dy){
          const nx=npc.x+dx,ny=npc.y+dy;
          if(!isBlocked(nx,ny)&&!(nx===state.px&&ny===state.py)){
            let blocked=false;
            for(const o of npcs){if(o!==npc&&o.x===nx&&o.y===ny){blocked=true;break;}}
            if(!blocked){npc.x=nx;npc.y=ny;npc.walkFrame=(npc.walkFrame+1)%8;
              if(dx<0)npc.facing='left';if(dx>0)npc.facing='right';
              if(dy<0)npc.facing='up';if(dy>0)npc.facing='down';}
          }
        }
        if(npc.x===target.x&&npc.y===target.y) npc.patrolIdx=(npc.patrolIdx+1)%npc.patrol.length;
      }
    }
  }
}

function updateAmbientNPCs(){
  for(const a of ambientNPCs){
    a.moveTimer++;
    if(a.moveTimer>a.moveDelay){
      a.moveTimer=0;
      let nx=a.x+a.dx;
      if(nx<a.minX||nx>a.maxX) a.dx=-a.dx;
      nx=a.x+a.dx;
      if(!isBlocked(nx,a.y)&&!(nx===state.px&&a.y===state.py)){
        a.x=nx;a.walkFrame=(a.walkFrame+1)%8;a.facing=a.dx>0?'right':'left';
      }
    }
  }
}

      break;

    case 'plug': doPlug(); break;
    case 'church':
      state.cred-=5;state.energy=Math.min(100,state.energy+50);state.karma+=10;
      showDialog(['-- CHURCH --','Peace washes over you.','ENERGY +50 | CRED -5 | KARMA +10']);
      break;
    case 'mosque':
      state.cred-=5;state.energy=Math.min(100,state.energy+50);state.karma+=10;
      showDialog(['-- MOSQUE --','You find inner peace.','ENERGY +50 | CRED -5 | KARMA +10']);
      break;
    case 'gym':
      state.energy-=20;state.skill+=5;state.cred+=3;
      showDialog(['-- GYM --','Iron therapy.','SKILL +5 | CRED +3 | ENERGY -20']);
      break;

      if(state.money<500){showDialog(['Hospital costs $500.']);return;}
      state.money-=500;state.energy=100;state.cred+=3;
      showDialog(['-- HOSPITAL --','Patched up.','ENERGY 100 | CRED +3 | -$500']);

    case 'police': doPoliceStation(); break;
    case 'prison':

}

function doHome(){
  // Sleep Z particles
  spawnSleepZ(state.px*TILE,state.py*TILE);
  state.energy=100; state.day++; state.gameHour=8; state.gameMinute=0; saveState();
  const wasJailed=state.jailDays>0;
  state.jailDays=Math.max(0,state.jailDays-1);
  if(wasJailed&&state.jailDays===0) checkAchievement('survived_prison');
  state.heat=Math.max(0,state.heat-5);
  state.wanted=Math.max(0,state.wanted-1);
  if(state.clubCooldown>0) state.clubCooldown--;
  // Phase C day-tick
  updateBuzz();
  checkARDealStatus();
  state.groupieFlirtToday=0;
  // v4.3 day-tick
  rollWeather();generatePuddles();
  updateCharts();
  checkBeefTrigger();
  if(state.weatherState==='heavy_rain') state.energy=Math.max(0,state.energy-10);// energy drain in heavy rain
  // Fling decay
  state.flings=(state.flings||[]).filter(f=>state.day<f.decayDay);
  // Girl loyalty decay
  if(state.mainGirl){
    // Simple: 10% chance she leaves if ignored (no interaction in 3 days)
    if(Math.random()<0.05){state.mainGirl=null;state.fame=Math.max(0,state.fame-3);
      spawnFloatingText(state.px*TILE,state.py*TILE-30,'She left...',PAL.accent);}
  }
  // Recruit loyalty decay
  (state.gangRecruits||[]).forEach((r,i)=>{r.loyalty=(r.loyalty||60)-2;});
  state.gangRecruits=(state.gangRecruits||[]).filter(r=>r.loyalty>20);
  (state.rapRecruits||[]).forEach((r,i)=>{r.loyalty=(r.loyalty||60)-2;});
  state.rapRecruits=(state.rapRecruits||[]).filter(r=>r.loyalty>20);
  // Gang passive income
  if(state.gang&&getGangRankIdx()>=1){
    const gangIncome=50*getGangRankIdx()+(state.gangRecruits||[]).length*20;
    if(gangIncome>0){state.money+=gangIncome;spawnFloatingText(state.px*TILE,state.py*TILE-50,'Gang +$'+gangIncome,GANGS[state.gang]?.color||PAL.green);}
  }
  // Defend block trigger
  if((state.trapInvested||state.gang)&&state.day-state.lastBlockAttack>=5+Math.floor(Math.random()*6)){
    state.lastBlockAttack=state.day;
    if(Math.random()<0.4) triggerDefendBlock();
  }
  // A&R meeting trigger
  if(state.arMeetingScheduled&&state.day>=state.arMeetingDay){
    triggerARMeeting();saveState();return;
  }

  // Trap income
  if(state.trapInvested){
    state.trapDaysSinceRaid++;
    if(state.trapDaysSinceRaid>=5&&Math.random()<0.3){
      // Raid!
      state.trapInvested=false;state.money-=2000;state.heat+=30;state.trapDaysSinceRaid=0;
      showDialog(['-- YOUR CRIB --','BAD NEWS: Trap house got raided!','-$2000, HEAT +30','Operation is shut down.']);
      saveState();return;
    } else {
      state.money+=200;
      spawnFloatingText(state.px*TILE,state.py*TILE-30,'Trap +$200',PAL.green);
    }
  }

  // Flip check
  if(state.hasProduct&&state.flipDaysLeft>0){
    state.flipDaysLeft--;
    if(state.flipDaysLeft<=0){
      if(Math.random()<0.2){triggerBust();return;}
      state.money+=state.flipPayout;state.hasProduct=false;state.heat+=10;
      sfxCash();spawnFloatingText(state.px*TILE,state.py*TILE-30,'+$'+state.flipPayout+' FLIPPED!',PAL.green);
      showDialog(['-- YOUR CRIB --','Product moved. +$'+state.flipPayout,'HEAT +10. Stay careful.']);
      state.flipPayout=0;saveState();return;
    }
  }

  // Traitor trigger
  if(!state.traitorRevealed&&state.day>=state.traitorDay){
    triggerTraitorBetray();saveState();return;
  }

  const events=[
    {text:'Good rest.',fn:()=>{}},
    {text:'Freestyle shower! SKILL +3',fn:()=>{state.skill+=3;}},
    {text:'Fan DM! FAME +5',fn:()=>{state.fame+=5;}},
    {text:'Venmo! +$50',fn:()=>{state.money+=50;sfxMoney();}},
    {text:'Haters online. CRED -3',fn:()=>{state.cred-=3;}},
  ];
  const ev=events[Math.floor(Math.random()*events.length)];ev.fn();
  spawnFloatingText(state.px*TILE,state.py*TILE-20,'DAY '+state.day,PAL.gold);
  let lines=['-- YOUR CRIB --','Day '+state.day+'. '+ev.text,'ENERGY RESTORED.'];
  if(state.hasProduct&&state.flipDaysLeft>0) lines.push('Product: '+state.flipDaysLeft+' day(s) left.');
  showDialog(lines);saveState();
}

// ========== RHYTHM BATTLE ==========
function startRhythmBattle(){
  gameScene='rhythm';state.energy-=20;
  const arrows=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
  const prompts=[];
  for(let i=0;i<16;i++) prompts.push({dir:arrows[Math.floor(Math.random()*4)],time:2000+i*800+Math.random()*200,hit:false,missed:false});
  rhythmState={prompts,startTime:performance.now(),hits:0,misses:0,done:false,score:0,showResult:false,resultTimer:0};
}

function checkRhythmHit(key){
  if(!rhythmState||rhythmState.done) return;
  const now=performance.now()-rhythmState.startTime;
  const targetY=canvas.height*0.75,speed=0.25;
  let hit=false;
  for(const p of rhythmState.prompts){
    if(p.hit||p.missed) continue;
    const py=(now-p.time)*speed;
    if(Math.abs(py-targetY+60)<50&&p.dir===key){p.hit=true;rhythmState.hits++;sfxHit();hit=true;break;}
  }
  if(!hit) sfxMiss();
}

function updateRhythm(){
  if(!rhythmState||rhythmState.done) return;
  const now=performance.now()-rhythmState.startTime;
  const speed=0.25,targetY=canvas.height*0.75;
  for(const p of rhythmState.prompts){
    if(!p.hit&&!p.missed&&(now-p.time)*speed>targetY+100){p.missed=true;rhythmState.misses++;}
  }
  if(rhythmState.prompts.every(p=>p.hit||p.missed)&&!rhythmState.showResult){
    rhythmState.done=true;rhythmState.showResult=true;rhythmState.resultTimer=0;
    rhythmState.score=Math.round((rhythmState.hits/rhythmState.prompts.length)*100);
    if(rhythmState.score>=70){state.fame+=30;state.cred+=15;state.money+=500;state.battles_won++;sfxWin();}
    else if(rhythmState.score>=40){state.fame+=10;}
    else{state.cred-=10;state.battles_lost++;sfxLose();}
    clampState();saveState();
  }
}

// ========== DRAWING ==========
function drawCharacterSprite(x,y,dir,frame,shirtCol,skinCol,hatCol){
  const b=Math.sin(frame*Math.PI/4)*2,leg=Math.sin(frame*Math.PI/4)*3;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x+24,y+60,16,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=PAL.pants;ctx.fillRect(x+12,y+40-b+leg,8,16);ctx.fillRect(x+28,y+40-b-leg,8,16);
  ctx.fillStyle=PAL.shoes;ctx.fillRect(x+10,y+54-b+leg,10,5);ctx.fillRect(x+28,y+54-b-leg,10,5);
  ctx.fillStyle=shirtCol;ctx.fillRect(x+10,y+20-b,28,22);
  const arm=Math.sin(frame*Math.PI/4)*5;
  ctx.fillRect(x+4,y+22-b+arm,8,18);ctx.fillRect(x+36,y+22-b-arm,8,18);
  ctx.fillStyle=skinCol;ctx.fillRect(x+5,y+38-b+arm,6,5);ctx.fillRect(x+37,y+38-b-arm,6,5);
  ctx.fillStyle=PAL.gold;ctx.fillRect(x+17,y+24-b,14,3);ctx.fillRect(x+21,y+27-b,6,4);
  ctx.fillStyle=skinCol;ctx.beginPath();ctx.arc(x+24,y+12-b,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hatCol;
  if(dir==='left'){ctx.fillRect(x+8,y+4-b,20,8);ctx.fillRect(x+4,y+6-b,10,6);}
  else if(dir==='right'){ctx.fillRect(x+18,y+4-b,20,8);ctx.fillRect(x+34,y+6-b,10,6);}
  else{ctx.fillRect(x+10,y+2-b,28,10);if(dir==='down')ctx.fillRect(x+12,y+10-b,24,4);}
  ctx.fillStyle='#1a1a2e';
  if(dir==='down'){ctx.fillRect(x+18,y+12-b,4,4);ctx.fillRect(x+26,y+12-b,4,4);ctx.fillStyle='#fff';ctx.fillRect(x+19,y+12-b,2,2);ctx.fillRect(x+27,y+12-b,2,2);
    // Mouth
    ctx.fillStyle='rgba(80,30,30,0.6)';ctx.fillRect(x+21,y+19-b,6,2);
  }
  else if(dir==='left'){ctx.fillRect(x+15,y+12-b,4,4);ctx.fillStyle='#fff';ctx.fillRect(x+15,y+12-b,2,2);
    ctx.fillStyle='rgba(80,30,30,0.6)';ctx.fillRect(x+16,y+18-b,4,2);
  }
  else if(dir==='right'){ctx.fillRect(x+29,y+12-b,4,4);ctx.fillStyle='#fff';ctx.fillRect(x+30,y+12-b,2,2);
    ctx.fillStyle='rgba(80,30,30,0.6)';ctx.fillRect(x+28,y+18-b,4,2);
  }
  else {// up - just back of head, no face visible
    ctx.fillStyle='rgba(80,30,30,0.3)';// hint of ears
    ctx.fillRect(x+14,y+12-b,3,3);ctx.fillRect(x+31,y+12-b,3,3);
  }
}

function drawSkyTint(){
  const tint=getSkyTint();
  ctx.fillStyle='rgba('+tint.r+','+tint.g+','+tint.b+','+tint.a+')';
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawMap(){
  const cx=camX,cy=camY,vw=canvas.width,vh=canvas.height;
  const tint=getSkyTint();
  const nightMode=isNightTime();
  const nightAlpha=nightMode?0.28:getTimePeriod()==='sunset'?0.08:0;
  ctx.fillStyle=nightMode?'#050510':'#0a0a1a';
  ctx.fillRect(0,0,vw,vh);
  const tx0=Math.max(0,Math.floor(cx/TILE)-1),ty0=Math.max(0,Math.floor(cy/TILE)-1);
  const tx1=Math.min(MAP_W,Math.ceil((cx+vw)/TILE)+1),ty1=Math.min(MAP_H,Math.ceil((cy+vh)/TILE)+1);

  // Ground
  for(let ty=ty0;ty<ty1;ty++){for(let tx=tx0;tx<tx1;tx++){
    const sx=tx*TILE-cx,sy=ty*TILE-cy;
    if(isRoad(tx,ty)){ctx.fillStyle=PAL.road;ctx.fillRect(sx,sy,TILE,TILE);}
    else if(isSidewalk(tx,ty)){ctx.fillStyle=PAL.sidewalk;ctx.fillRect(sx,sy,TILE,TILE);}
    else if(isHollywoodHills(tx,ty)){
      ctx.fillStyle=((tx+ty)%2===0)?'#4a7a5a':'#5a8a6a';ctx.fillRect(sx,sy,TILE,TILE);
      // Palm tree trunks on some tiles
      if((tx*3+ty*7)%17===0){ctx.fillStyle='#8a6a3a';ctx.fillRect(sx+20,sy+10,6,30);
        ctx.fillStyle='#3a8a3a';ctx.beginPath();ctx.moveTo(sx+23,sy);ctx.lineTo(sx+8,sy+14);ctx.lineTo(sx+38,sy+14);ctx.fill();}
    }
    else if(isGhetto(tx,ty)){
      ctx.fillStyle=((tx*5+ty*3)%3===0)?'#2a2a20':'#252520';ctx.fillRect(sx,sy,TILE,TILE);
      // Graffiti splotches
      if((tx*7+ty*11)%23===0){
        const gc=['#e63946','#457b9d','#ffc832','#9b30ff','#2a9d8f'][(tx+ty)%5];
        ctx.fillStyle=gc+'60';ctx.fillRect(sx+5+((tx*3)%10),sy+5+((ty*3)%10),12+((tx)%8),8+((ty)%6));}
    }
    else{ctx.fillStyle=((tx*7+ty*13)%3===0)?PAL.grass1:PAL.grass2;ctx.fillRect(sx,sy,TILE,TILE);}
  }}

  // Tile decorations (cracks, manholes, oil stains, seams)
  const decs=state.tileDecorations;
  if(decs){
    ctx.lineWidth=1;
    for(const c of decs.cracks){
      const sx2=c.x*TILE-cx,sy2=c.y*TILE-cy;
      if(sx2<-TILE||sx2>vw||sy2<-TILE||sy2>vh) continue;
      ctx.strokeStyle='rgba(60,50,50,0.5)';ctx.beginPath();
      ctx.moveTo(sx2+10,sy2+TILE/2);
      ctx.lineTo(sx2+10+Math.cos(c.r)*c.len,sy2+TILE/2+Math.sin(c.r)*c.len);
      ctx.lineTo(sx2+14+Math.cos(c.r+0.5)*c.len*0.7,sy2+TILE/2+Math.sin(c.r+0.5)*c.len*0.5);
      ctx.stroke();
    }
    for(const m of decs.manholes){
      const sx2=m.x*TILE-cx,sy2=m.y*TILE-cy;
      if(sx2<-TILE||sx2>vw||sy2<-TILE||sy2>vh) continue;
      ctx.fillStyle='rgba(40,40,50,0.6)';ctx.beginPath();ctx.arc(sx2+TILE/2,sy2+TILE/2,10,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(80,80,90,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx2+TILE/2,sy2+TILE/2,10,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx2+TILE/2-6,sy2+TILE/2);ctx.lineTo(sx2+TILE/2+6,sy2+TILE/2);ctx.stroke();
    }
    for(const o of decs.oilStains){
      const sx2=o.x*TILE-cx,sy2=o.y*TILE-cy;
      if(sx2<-TILE||sx2>vw||sy2<-TILE||sy2>vh) continue;
      ctx.fillStyle='rgba(20,20,30,0.3)';ctx.beginPath();ctx.ellipse(sx2+TILE/2,sy2+TILE/2,o.size/2,o.size/3,0.3,0,Math.PI*2);ctx.fill();
    }
    for(const s of decs.seams){
      const sx2=s.x*TILE-cx,sy2=s.y*TILE-cy;
      if(sx2<-TILE||sx2>vw||sy2<-TILE||sy2>vh) continue;
      ctx.strokeStyle='rgba(100,90,85,0.25)';ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(sx2,sy2+TILE);ctx.stroke();
    }
    // Puddles during/after rain
    if(state.weatherState!=='clear'){
      for(const p of puddles){
        const sx2=p.x*TILE-cx,sy2=p.y*TILE-cy;
        if(sx2<-TILE||sx2>vw||sy2<-TILE||sy2>vh) continue;
        ctx.fillStyle='rgba(100,130,180,0.2)';ctx.beginPath();ctx.ellipse(sx2+TILE/2,sy2+TILE/2+8,p.w/2,p.h/2,0,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Road markings
  for(const rows of HROAD){const mid=rows[1];for(let x=tx0;x<tx1;x++){
    if(x%3===0){let skip=false;for(const c of VROAD)if(c.includes(x))skip=true;
      if(!skip){ctx.fillStyle=PAL.roadLine;ctx.fillRect(x*TILE-cx+8,mid*TILE-cy+22,TILE-16,4);}}}}
  for(const cols of VROAD){const mid=cols[0];for(let y=ty0;y<ty1;y++){
    if(y%3===0){
      let skip=false;for(const r of HROAD)if(r.includes(y))skip=true;
      if(!skip){ctx.fillStyle=PAL.roadLine;ctx.fillRect(mid*TILE-cx+22,y*TILE-cy+8,4,TILE-16);}}}}

  // Parked cars (decoration)
  const cars=[{x:3,y:9,c:'#5a2020'},{x:8,y:9,c:'#2a2a5a'},{x:15,y:9,c:'#444'},{x:22,y:9,c:'#5a5a20'},
    {x:30,y:9,c:'#203a5a'},{x:5,y:13,c:'#4a2040'},{x:17,y:13,c:'#2a5a3a'},{x:28,y:13,c:'#5a3a20'},
    {x:6,y:19,c:'#3a3a3a'},{x:20,y:19,c:'#5a2a2a'},{x:33,y:19,c:'#2a3a5a'},
    {x:10,y:23,c:'#4a4a2a'},{x:24,y:23,c:'#3a2a4a'},{x:35,y:23,c:'#2a4a3a'},
    {x:42,y:9,c:'#7a5a9a'},{x:46,y:9,c:'#9a7aba'},{x:44,y:13,c:'#6a8ab0'},// Hollywood
    {x:3,y:29,c:'#3a2a1a'},{x:8,y:29,c:'#2a2a1a'},{x:3,y:33,c:'#4a3a2a'},// Ghetto (beat up)
    {x:30,y:29,c:'#3a3a4a'},{x:38,y:33,c:'#2a3a5a'},{x:44,y:29,c:'#5a4a3a'}];
  cars.forEach(car=>{
    const sx=car.x*TILE-cx,sy=car.y*TILE-cy;
    if(sx<-80||sx>vw+80||sy<-60||sy>vh+60) return;
    ctx.fillStyle=car.c;ctx.fillRect(sx+4,sy+12,40,20);ctx.fillRect(sx+10,sy+4,28,12);
    ctx.fillStyle='#111';ctx.fillRect(sx+6,sy+30,10,6);ctx.fillRect(sx+32,sy+30,10,6);
    ctx.fillStyle='rgba(150,200,255,0.3)';ctx.fillRect(sx+12,sy+6,24,8);
  });

  // Fire hydrants
  [{x:1,y:13},{x:10,y:9},{x:18,y:19},{x:32,y:23},{x:25,y:9},{x:36,y:13}].forEach(h=>{
    const sx=h.x*TILE-cx+16,sy=h.y*TILE-cy+10;
    if(sx<-30||sx>vw+30||sy<-30||sy>vh+30)return;
    ctx.fillStyle='#c03030';ctx.fillRect(sx,sy,14,24);ctx.fillRect(sx-4,sy+6,22,6);
  });

  // Lamp posts with gang color tinting
  const lamps=[];
  for(let x=1;x<MAP_W;x+=5){for(const ly of [9,13,19,23,29,33]) lamps.push([x,ly]);}
  lamps.forEach(([lx,ly])=>{
    const sx=lx*TILE-cx+TILE/2,sy=ly*TILE-cy;
    if(sx<-80||sx>vw+80||sy<-80||sy>vh+80) return;
    ctx.fillStyle='#555';ctx.fillRect(sx-2,sy-30,4,50);
    ctx.fillStyle='#888';ctx.fillRect(sx-8,sy-34,16,6);
    // Gang territory tint
    let glowColor='rgba(255,235,150,';
    if(isHollywoodHills(lx,ly)) glowColor='rgba(212,176,240,';
    else if(isGhetto(lx,ly)) glowColor='rgba(200,150,80,';
    else if(lx<14&&ly<13) glowColor='rgba(255,200,50,';
    else if(lx>=15&&ly<13) glowColor='rgba(230,57,70,';
    else if(lx<14&&ly>=13) glowColor='rgba(69,123,157,';
    else glowColor='rgba(155,48,255,';
    // Bigger glow at night
    const glowRadius=nightMode?80:50;
    const ga=nightMode?0.45:0.1+nightAlpha*0.3;
    const grd=ctx.createRadialGradient(sx,sy-20,0,sx,sy-20,glowRadius);
    grd.addColorStop(0,glowColor+ga+')');
    grd.addColorStop(0.5,glowColor+(ga*0.4)+')');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(sx-glowRadius,sy-glowRadius-20,glowRadius*2,glowRadius*2);
    // Lamp bulb glow at night
    if(nightMode){ctx.fillStyle=glowColor+'0.7)';ctx.beginPath();ctx.arc(sx,sy-30,4,0,Math.PI*2);ctx.fill();}
  });

  // Buildings
  for(const b of buildings){
    const bx=b.x*TILE-cx,by=b.y*TILE-cy,bw=b.w*TILE,bh=b.h*TILE;
    if(bx>vw+20||bx+bw<-20||by>vh+20||by+bh<-20) continue;
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(bx+6,by+6,bw,bh);
    const bg=ctx.createLinearGradient(bx,by,bx,by+bh);
    bg.addColorStop(0,b.accentC);bg.addColorStop(1,b.color);
    ctx.fillStyle=bg;ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(bx,by,bw,10);
    ctx.fillStyle=b.accentC;ctx.fillRect(bx-4,by-4,bw+8,8);

    // Special building visuals
    if(b.id==='gun'){
      ctx.fillStyle='rgba(255,235,180,0.4)';ctx.fillRect(bx+15,by+25,bw-30,40);
      for(let i=0;i<3;i++){ctx.strokeStyle='#888';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(bx+25+i*30,by+30);ctx.lineTo(bx+25+i*30,by+55);ctx.stroke();}
    } else if(b.id==='plug'){
      const fl=0.3+0.2*Math.sin(gameTime*0.05);
      ctx.fillStyle=`rgba(255,50,100,${fl})`;ctx.fillRect(bx+10,by+15,bw-20,4);
      ctx.fillStyle='rgba(20,10,30,0.8)';ctx.fillRect(bx+15,by+25,bw-30,40);
    } else if(b.id==='club'){
      const np=0.5+0.3*Math.sin(gameTime*0.04);
      ctx.strokeStyle=`rgba(155,48,255,${np})`;ctx.lineWidth=3;ctx.strokeRect(bx+2,by+2,bw-4,bh-4);ctx.lineWidth=1;
      // Neon glow at night
      if(nightMode){const ng=ctx.createRadialGradient(bx+bw/2,by+bh/2,0,bx+bw/2,by+bh/2,bw);
        ng.addColorStop(0,'rgba(155,48,255,'+(0.15+0.1*Math.sin(gameTime*0.06))+')');ng.addColorStop(1,'transparent');
        ctx.fillStyle=ng;ctx.fillRect(bx-bw/2,by-bh/2,bw*2,bh*2);}
    } else if(b.id==='battle'){
      // Venue neon at night
      if(nightMode){const vn=0.5+0.3*Math.sin(gameTime*0.05);
        ctx.strokeStyle=`rgba(230,57,70,${vn})`;ctx.lineWidth=2;ctx.strokeRect(bx+2,by+2,bw-4,bh-4);ctx.lineWidth=1;
        const vg=ctx.createRadialGradient(bx+bw/2,by+bh/2,0,bx+bw/2,by+bh/2,bw*0.8);
        vg.addColorStop(0,'rgba(230,57,70,'+(0.1+0.08*Math.sin(gameTime*0.07))+')');vg.addColorStop(1,'transparent');
        ctx.fillStyle=vg;ctx.fillRect(bx-bw/3,by-bh/3,bw*1.6,bh*1.6);}
    } else if(b.id==='police'){
      // Patrol car
      ctx.fillStyle='#2a3a6a';ctx.fillRect(bx+bw-50,by+bh+5,44,18);
      ctx.fillStyle='#e63946';ctx.fillRect(bx+bw-44,by+bh+3,8,4);
      ctx.fillStyle='#457b9d';ctx.fillRect(bx+bw-30,by+bh+3,8,4);
    } else if(b.id==='prison'){
      // Bars on windows
      for(let i=0;i<3;i++){for(let j=0;j<4;j++){
        ctx.strokeStyle='#888';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(bx+15+i*40+j*8,by+20);ctx.lineTo(bx+15+i*40+j*8,by+50);ctx.stroke();}}
    } else if(b.id==='church'){
      // Cross on top
      ctx.fillStyle='#c4a060';ctx.fillRect(bx+bw/2-3,by-15,6,20);ctx.fillRect(bx+bw/2-8,by-10,16,5);
    } else if(b.id==='mosque'){
      // Crescent
      ctx.strokeStyle='#2a8a6a';ctx.lineWidth=2;ctx.beginPath();ctx.arc(bx+bw/2,by-5,8,0.3,Math.PI*1.7);ctx.stroke();
    } else if(b.id==='dealership'){
      // Showroom glass
      ctx.fillStyle='rgba(100,180,255,0.15)';ctx.fillRect(bx+5,by+15,bw-10,bh-20);
      // Mini car silhouettes
      for(let i=0;i<4;i++){
        ctx.fillStyle=['#5a4a3a','#3a5a7a','#7a5a9a','#9a2a2a'][i];
        ctx.fillRect(bx+10+i*(bw-20)/4,by+bh-20,18,10);}
    } else if(b.district==='HOLLYWOOD'&&!b.deco){
      // Glass windows
      const wc=Math.floor(b.w*1.2),wr=b.h-1;
      for(let r=0;r<wr;r++){for(let c=0;c<wc;c++){
        const wx=bx+12+c*(bw-24)/Math.max(wc-1,1),wy=by+18+r*38;
        ctx.fillStyle='rgba(180,220,255,0.5)';ctx.fillRect(wx-8,wy,16,18);}}
    } else if(b.deco){
      // Mansions - big glass facade
      ctx.fillStyle='rgba(200,230,255,0.2)';ctx.fillRect(bx+8,by+12,bw-16,bh-16);
      ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
      for(let i=0;i<3;i++)ctx.strokeRect(bx+12+i*(bw-24)/3,by+14,bw/4,bh-20);
    } else if(b.district==='GHETTO'){
      // Graffiti on walls
      ctx.fillStyle='rgba(230,57,70,0.3)';ctx.fillRect(bx+5,by+bh-18,20,8);
      ctx.fillStyle='rgba(69,123,157,0.3)';ctx.fillRect(bx+bw-30,by+15,15,10);
      // Boarded windows
      const wc=Math.floor(b.w*1.2);
      for(let c=0;c<wc;c++){
        const wx=bx+12+c*(bw-24)/Math.max(wc-1,1),wy=by+18;
        ctx.fillStyle='#3a3020';ctx.fillRect(wx-8,wy,16,18);
        ctx.strokeStyle='#5a4a30';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(wx-8,wy);ctx.lineTo(wx+8,wy+18);ctx.stroke();
        ctx.beginPath();ctx.moveTo(wx+8,wy);ctx.lineTo(wx-8,wy+18);ctx.stroke();}
    } else {
      // Windows
      const wc=Math.floor(b.w*1.2),wr=b.h-1;
      for(let r=0;r<wr;r++){for(let c=0;c<wc;c++){
        const wx=bx+12+c*(bw-24)/Math.max(wc-1,1),wy=by+18+r*38;
        ctx.fillStyle=((c+r+Math.floor(gameTime/300))%3!==0)?'rgba(255,235,180,0.7)':'rgba(30,30,60,0.6)';
        ctx.fillRect(wx-8,wy,16,18);}}
    }

    // Door
    const dsx=b.doorX*TILE-cx,dsy=(b.doorY-1)*TILE-cy;
    ctx.fillStyle='#3a2a15';ctx.fillRect(dsx+10,dsy+14,28,34);
    ctx.fillStyle='#2a1a0a';ctx.fillRect(dsx+12,dsy+16,24,30);
    ctx.fillStyle=PAL.gold;ctx.fillRect(dsx+32,dsy+32,3,3);

    // Sign
    ctx.font='bold 10px Inter';
    const sw=Math.max(ctx.measureText(b.name).width+16,60);
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(bx+bw/2-sw/2,by-22,sw,18);
    ctx.strokeStyle=b.accentC;ctx.lineWidth=1;ctx.strokeRect(bx+bw/2-sw/2,by-22,sw,18);
    ctx.fillStyle=PAL.white;ctx.textAlign='center';ctx.fillText(b.name,bx+bw/2,by-9);
  }

  // Trees
  const trees=[[0,0],[0,5],[0,14],[0,18],[0,28],[0,35],[49,0],[49,5],[49,14],[49,18],[49,28],[49,35],
    [5,0],[10,0],[20,0],[30,0],[35,0],[45,0],[5,38],[15,38],[25,38],[35,38],[45,38],
    [6,6],[14,6],[22,6],[6,14],[14,14],[22,14],[6,24],[14,24],[22,24],
    [6,34],[14,34],[22,34],[36,24],[44,6],[48,14],[48,24]];
  trees.forEach(([tx,ty])=>{
    const sx=tx*TILE-cx,sy=ty*TILE-cy;
    if(sx<-50||sx>vw+50||sy<-50||sy>vh+50) return;
    ctx.fillStyle='#5a3a1a';ctx.fillRect(sx+18,sy+28,12,20);
    ctx.fillStyle='#1e6830';ctx.beginPath();ctx.arc(sx+24,sy+18,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2e8a44';ctx.beginPath();ctx.arc(sx+24,sy+12,12,0,Math.PI*2);ctx.fill();
  });

  // District labels
  [{t:'DOWNTOWN',x:6,y:1,c:PAL.gold},{t:'EASTSIDE',x:22,y:1,c:PAL.accent},
   {t:'WESTSIDE',x:5,y:14,c:PAL.blue},{t:'SOUTHSIDE',x:22,y:14,c:'#9b30ff'},
   {t:'HOLLYWOOD HILLS',x:38,y:1,c:'#d4b0f0'},{t:'THE GHETTO',x:6,y:34,c:'#6a4a3a'}].forEach(d=>{
    const sx=d.x*TILE-cx,sy=d.y*TILE-cy;
    if(sx<-100||sx>vw+100||sy<-20||sy>vh+20) return;
    ctx.fillStyle=d.c;ctx.font='bold 14px "Bebas Neue"';ctx.textAlign='center';ctx.fillText(d.t,sx,sy+20);
  });

  // Gang territory borders (subtle)
  if(state.gang){
    const g=GANGS[state.gang];
    ctx.strokeStyle=g.color+'40';ctx.lineWidth=2;ctx.setLineDash([8,4]);
    const t=g.territory;
    ctx.strokeRect(t[0][0]*TILE-cx,t[0][1]*TILE-cy,(t[1][0]-t[0][0])*TILE,(t[1][1]-t[0][1])*TILE);
    ctx.setLineDash([]);ctx.lineWidth=1;
  }

  // Ghetto graffiti tags on walls
  const graffitiTags=[{x:3,y:27,t:'REAL'},{x:8,y:28,t:'187'},{x:1,y:33,t:'RIP'},{x:10,y:35,t:'TRAP'},
    {x:5,y:37,t:'HOOD'},{x:12,y:26,t:'$$$'},{x:4,y:30,t:'GANG'}];
  for(const g of graffitiTags){
    const gx=g.x*TILE-cx,gy=g.y*TILE-cy;
    if(gx<-60||gx>vw+60||gy<-30||gy>vh+30) continue;
    ctx.fillStyle=['#e63946','#457b9d','#ffc832','#9b30ff','#2a9d8f'][(g.x+g.y)%5]+'90';
    ctx.font='bold 11px "Bebas Neue"';ctx.textAlign='left';ctx.fillText(g.t,gx+4,gy+20);
  }

  // Hollywood palm trees (additional decoration)
  [[30,1],[34,1],[38,4],[43,1],[47,4],[32,8],[44,8]].forEach(([ptx,pty])=>{
    const sx=ptx*TILE-cx,sy=pty*TILE-cy;
    if(sx<-60||sx>vw+60||sy<-60||sy>vh+60) return;
    ctx.fillStyle='#8a6a3a';ctx.fillRect(sx+20,sy+20,6,28);
    ctx.fillStyle='#3a9a3a';
    ctx.beginPath();ctx.moveTo(sx+23,sy+5);ctx.lineTo(sx+5,sy+22);ctx.lineTo(sx+41,sy+22);ctx.fill();
    ctx.beginPath();ctx.moveTo(sx+23,sy);ctx.lineTo(sx+10,sy+15);ctx.lineTo(sx+36,sy+15);ctx.fill();
  });

  // Music notes
  for(let i=0;i<6;i++){
    const nx=(200+i*250+Math.sin(gameTime*0.002+i*2)*80)%WORLD_W;
    const ny=(100+i*180+Math.cos(gameTime*0.001+i)*50)%WORLD_H;
    ctx.fillStyle=`rgba(255,200,50,${0.12+0.08*Math.sin(gameTime*0.003+i)})`;
    ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(i%2===0?'♪':'♫',nx-cx,ny-cy);
  }

  if(nightAlpha>0.01){ctx.fillStyle=`rgba(10,5,30,${nightAlpha})`;ctx.fillRect(0,0,vw,vh);}
}


function drawNPCs(){
  for(const npc of npcs){
    if(state.npcDead[npc.id]&&state.day-state.npcDead[npc.id]<3) continue;
    const sx=npc.x*TILE-camX,sy=npc.y*TILE-camY;
    if(sx<-80||sx>canvas.width+80||sy<-80||sy>canvas.height+80) continue;
    drawCharacterSprite(sx,sy-16,npc.facing,npc.walkFrame,npc.color,PAL.skinDark,npc.hatColor);
    // Name tag
    ctx.fillStyle='rgba(0,0,0,0.5)';const nw=npc.name.length*6+12;
    ctx.fillRect(sx+24-nw/2,sy-28,nw,16);
    ctx.fillStyle=PAL.white;ctx.font='9px Inter';ctx.textAlign='center';
    ctx.fillText(npc.name,sx+24,sy-17);
    // Gang indicator
    if(npc.gang){ctx.fillStyle=GANGS[npc.gang].color;ctx.fillRect(sx+18,sy-30,12,3);}
    // Interaction prompt
    if(npc===nearNPC&&!dialog&&!choiceDialog){
      const by=Math.sin(animFrame*0.1)*4;
      ctx.fillStyle=PAL.gold;ctx.font='bold 12px Inter';
      ctx.fillText('E/SPACE',sx+24,sy-38+by);
      ctx.font='9px Inter';ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fillText('X:slap Z:shoot',sx+24,sy-50+by);
    }
  }
  // Ambient
  for(const a of ambientNPCs){
    const sx=a.x*TILE-camX,sy=a.y*TILE-camY;
    if(sx<-80||sx>canvas.width+80||sy<-80||sy>canvas.height+80) continue;
    drawCharacterSprite(sx,sy-16,a.facing,a.walkFrame,a.color,'#c0956a',a.color);
  }
}

function drawCarSprite(x,y,dir,color){
  // Simple top-down car
  const vertical=dir==='up'||dir==='down';
  if(vertical){
    ctx.fillStyle=color;ctx.fillRect(x+6,y+4,36,44);ctx.fillRect(x+10,y,28,48);
    ctx.fillStyle='rgba(150,200,255,0.4)';ctx.fillRect(x+12,y+(dir==='up'?6:30),24,10);
    ctx.fillStyle='#111';ctx.fillRect(x+6,y+(dir==='up'?42:2),10,6);ctx.fillRect(x+32,y+(dir==='up'?42:2),10,6);
    ctx.fillStyle='#ff0';ctx.fillRect(x+12,y+(dir==='down'?44:0),6,3);ctx.fillRect(x+30,y+(dir==='down'?44:0),6,3);
  } else {
    ctx.fillStyle=color;ctx.fillRect(x+2,y+8,44,32);ctx.fillRect(x,y+12,48,24);
    ctx.fillStyle='rgba(150,200,255,0.4)';ctx.fillRect(x+(dir==='left'?6:30),y+14,10,20);
    ctx.fillStyle='#111';ctx.fillRect(x+(dir==='left'?40:2),y+8,6,10);ctx.fillRect(x+(dir==='left'?40:2),y+30,6,10);
    ctx.fillStyle='#ff0';ctx.fillRect(x+(dir==='right'?44:0),y+14,3,6);ctx.fillRect(x+(dir==='right'?44:0),y+28,3,6);
  }
}

function drawParkedCar(){
  if(!state.currentCar||isDriving) return;
  const cp=getCarParkTile();
  const sx=cp.x*TILE-camX,sy=cp.y*TILE-camY;
  if(sx<-80||sx>canvas.width+80||sy<-60||sy>canvas.height+60) return;
  const cd=getCarDef(state.currentCar);
  drawCarSprite(sx,sy,'down',cd?cd.color:'#555');
  // Label
  if(Math.abs(state.px-cp.x)<=2&&Math.abs(state.py-cp.y)<=2){
    ctx.fillStyle=PAL.gold;ctx.font='bold 9px Inter';ctx.textAlign='center';
    ctx.fillText('V to drive',sx+24,sy-6);
  }
}

function drawPlayer(){
  const tcx=state.px*TILE-canvas.width/2+TILE/2;
  const tcy=state.py*TILE-canvas.height/2+TILE/2;
  camX+=(tcx-camX)*CAM_EASE;camY+=(tcy-camY)*CAM_EASE;
  camX=Math.max(0,Math.min(WORLD_W-canvas.width,camX));
  camY=Math.max(0,Math.min(WORLD_H-canvas.height,camY));
  const sx=state.px*TILE-camX,sy=state.py*TILE-camY;
  if(isDriving&&state.currentCar){
    const cd=getCarDef(state.currentCar);
    drawCarSprite(sx,sy,facing,cd?cd.color:'#555');
  } else {
    // Use outfit colors if equipped
    const shirtC=(state.outfit&&state.outfit.shirt!=='default')?state.outfit.shirt:PAL.shirt;
    const pantsC=(state.outfit&&state.outfit.pants!=='default')?state.outfit.pants:PAL.pants;
    drawCharacterSprite(sx,sy-16,facing,walkFrame,shirtC,PAL.skin,PAL.accent);
    // Jewelry overlays
    if(state.jewelry&&state.jewelry.chain){
      ctx.fillStyle='#ffc832';ctx.fillRect(sx+17,sy+8-Math.sin(walkFrame*Math.PI/4)*2,14,3);
    }
    if(state.jewelry&&state.jewelry.watch){
      ctx.fillStyle='#ccc';ctx.fillRect(sx+4,sy+26-Math.sin(walkFrame*Math.PI/4)*2,6,4);
    }
    if(state.jewelry&&state.jewelry.rings){
      ctx.fillStyle='#ffc832';ctx.fillRect(sx+37,sy+26-Math.sin(walkFrame*Math.PI/4)*2,4,3);
    }
    // Accessories
    if(state.outfit&&state.outfit.glasses){
      ctx.fillStyle='#333';ctx.fillRect(sx+16,sy-5-Math.sin(walkFrame*Math.PI/4)*2,16,4);
    }
    if(state.outfit&&state.outfit.grill){
      ctx.fillStyle='#ffc832';ctx.fillRect(sx+20,sy+4-Math.sin(walkFrame*Math.PI/4)*2,8,2);
    }
  }
}

function drawHUD(){
  const px=canvas.width-185,py=10,pw=175;
  const icons={FAME:'♪',MONEY:'$',SKILL:'★',CRED:'★',ENERGY:'⚡',HEAT:'☠',BUZZ:'♫',DRIP:'♦'};
  const stats=[
    {l:'FAME',v:state.fame,c:'#e63946',max:200},
    {l:'MONEY',v:'$'+state.money,c:'#2a9d8f'},
    {l:'SKILL',v:state.skill,c:'#457b9d'},
    {l:'CRED',v:state.cred,c:'#e76f51',max:100},
    {l:'ENERGY',v:state.energy,c:'#ffc832',max:100},
    {l:'HEAT',v:state.heat,c:'#ff6b9d',max:100},
  ];
  if(state.buzz>0)stats.push({l:'BUZZ',v:state.buzz,c:'#ff6b9d',max:100});
  if(state.drip>0)stats.push({l:'DRIP',v:state.drip,c:PAL.gold});
  if(state.hasGun)stats.push({l:'PIECE',v:'YES',c:'#888'});
  if(state.wanted>0)stats.push({l:'WANTED',v:'*'.repeat(state.wanted),c:'#e63946'});
  if(state.gang)stats.push({l:'GANG',v:GANGS[state.gang].name.split(' ')[0],c:GANGS[state.gang].color});
  if(state.signed)stats.push({l:'LABEL',v:LABELS.find(l=>l.id===state.label)?.name.split(' ')[0]||'?',c:PAL.green});
  if(isDriving&&state.currentCar){const cd=getCarDef(state.currentCar);
    stats.push({l:'CAR',v:cd?cd.name:'?',c:'#4a8aba'});
    const dmg=state.carDamage[state.currentCar]||0;
    if(dmg>0)stats.push({l:'DMG',v:dmg,c:dmg>50?PAL.accent:PAL.warmGlow});}
  const ph=18+stats.length*18+8;

  // Rounded-corner look via clip
  ctx.save();
  const r=6;
  ctx.beginPath();ctx.moveTo(px+r,py);ctx.lineTo(px+pw-r,py);ctx.quadraticCurveTo(px+pw,py,px+pw,py+r);
  ctx.lineTo(px+pw,py+ph-r);ctx.quadraticCurveTo(px+pw,py+ph,px+pw-r,py+ph);
  ctx.lineTo(px+r,py+ph);ctx.quadraticCurveTo(px,py+ph,px,py+ph-r);
  ctx.lineTo(px,py+r);ctx.quadraticCurveTo(px,py,px+r,py);ctx.closePath();ctx.clip();

  // Gradient bg + shadow
  const hg=ctx.createLinearGradient(px,py,px,py+ph);
  hg.addColorStop(0,'rgba(15,15,35,0.92)');hg.addColorStop(1,'rgba(10,10,26,0.95)');
  ctx.fillStyle=hg;ctx.fillRect(px,py,pw,ph);
  ctx.restore();
  // Border
  ctx.strokeStyle='rgba(255,200,50,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px+r,py);ctx.lineTo(px+pw-r,py);ctx.quadraticCurveTo(px+pw,py,px+pw,py+r);
  ctx.lineTo(px+pw,py+ph-r);ctx.quadraticCurveTo(px+pw,py+ph,px+pw-r,py+ph);
  ctx.lineTo(px+r,py+ph);ctx.quadraticCurveTo(px,py+ph,px,py+ph-r);
  ctx.lineTo(px,py+r);ctx.quadraticCurveTo(px,py,px+r,py);ctx.closePath();ctx.stroke();

  ctx.font='bold 10px Inter';
  stats.forEach((s,i)=>{
    const sy=py+16+i*18;
    // Icon
    const icon=icons[s.l]||'';
    ctx.fillStyle=s.c;ctx.textAlign='left';
    if(icon){ctx.fillText(icon,px+6,sy);ctx.fillText(s.l,px+18,sy);}
    else ctx.fillText(s.l,px+8,sy);
    ctx.fillStyle=PAL.white;ctx.textAlign='right';ctx.fillText(''+s.v,px+pw-8,sy);
    if(s.max){
      const bx2=px+58,bw2=48,bh2=3,by2=sy+2;
      const nv=typeof s.v==='string'?parseInt(s.v.replace('$','')):s.v;
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(bx2,by2,bw2,bh2);
      ctx.fillStyle=s.c;ctx.fillRect(bx2,by2,bw2*Math.min(1,nv/s.max),bh2);
    }
  });

  // Time + Weather indicator (top-left)
  const twx=10,twy=8;
  ctx.fillStyle='rgba(10,10,26,0.85)';ctx.fillRect(twx,twy,110,22);
  ctx.strokeStyle='rgba(255,200,50,0.2)';ctx.strokeRect(twx,twy,110,22);
  const weatherIcons={clear:'☀',light_rain:'☁',heavy_rain:'⛈'};
  ctx.fillStyle=PAL.warmGlow;ctx.font='bold 11px "Courier New"';ctx.textAlign='left';
  ctx.fillText(getTimeString(),twx+4,twy+16);
  ctx.fillStyle=state.weatherState==='clear'?PAL.warmGlow:'#8ab0d0';ctx.font='11px Inter';
  ctx.fillText((weatherIcons[state.weatherState]||'')+' D'+state.day,twx+68,twy+16);
}

function drawMiniMap(){
  const mw=120,mh=90,mx=10,my=58;
  ctx.fillStyle='rgba(10,10,26,0.85)';ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle=PAL.gold+'60';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
  const sx=mw/MAP_W,sy2=mh/MAP_H;
  // Roads
  ctx.fillStyle='rgba(58,58,80,0.5)';
  for(const r of HROAD)ctx.fillRect(mx,my+r[0]*sy2,mw,r.length*sy2);
  for(const c of VROAD)ctx.fillRect(mx+c[0]*sx,my,c.length*sx,mh);
  // Buildings
  for(const b of buildings){ctx.fillStyle=b.accentC+'88';ctx.fillRect(mx+b.x*sx,my+b.y*sy2,b.w*sx,b.h*sy2);}
  // Player
  ctx.fillStyle=(animFrame%30<15)?'#fff':PAL.gold;
  ctx.fillRect(mx+state.px*sx-2,my+state.py*sy2-2,4,4);
  // NPCs
  for(const n of npcs){if(!state.npcDead[n.id]){ctx.fillStyle=n.color;ctx.fillRect(mx+n.x*sx-1,my+n.y*sy2-1,2,2);}}
  // Frame
  ctx.strokeStyle='rgba(255,200,50,0.15)';ctx.lineWidth=1;ctx.strokeRect(mx-1,my-1,mw+2,mh+2);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='7px Inter';ctx.textAlign='center';ctx.fillText('M = full map',mx+mw/2,my+mh+8);
}

function drawFullMap(){
  if(!showFullMap) return;
  const w=canvas.width,h=canvas.height;
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,w,h);
  const pad=30,mw=w-pad*2,mh=h-pad*2-20,mx=pad,my=pad+15;
  ctx.fillStyle='rgba(15,15,35,0.95)';ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle=PAL.gold;ctx.lineWidth=2;ctx.strokeRect(mx,my,mw,mh);
  const sx=mw/MAP_W,sy2=mh/MAP_H;
  ctx.fillStyle=PAL.grass1+'60';ctx.fillRect(mx,my,mw,mh);
  ctx.fillStyle='rgba(58,58,80,0.6)';
  for(const r of HROAD)ctx.fillRect(mx,my+r[0]*sy2,mw,r.length*sy2);
  for(const c of VROAD)ctx.fillRect(mx+c[0]*sx,my,c.length*sx,mh);
  for(const b of buildings){
    ctx.fillStyle=b.accentC;ctx.fillRect(mx+b.x*sx,my+b.y*sy2,b.w*sx,b.h*sy2);
    ctx.fillStyle=PAL.white;ctx.font='bold 7px Inter';ctx.textAlign='center';
    ctx.fillText(b.name.length>10?b.id.toUpperCase():b.name,mx+(b.x+b.w/2)*sx,my+(b.y+b.h/2)*sy2+3);
  }
  // Gang territories
  Object.values(GANGS).forEach(g=>{
    ctx.strokeStyle=g.color+'60';ctx.lineWidth=2;ctx.setLineDash([6,3]);
    const t=g.territory;
    ctx.strokeRect(mx+t[0][0]*sx,my+t[0][1]*sy2,(t[1][0]-t[0][0])*sx,(t[1][1]-t[0][1])*sy2);
    ctx.setLineDash([]);
  });
  ctx.fillStyle=PAL.gold;ctx.beginPath();ctx.arc(mx+state.px*sx,my+state.py*sy2,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(mx+state.px*sx,my+state.py*sy2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=PAL.gold;ctx.font='bold 18px "Bebas Neue"';ctx.textAlign='center';ctx.fillText('CITY MAP',w/2,my-2);
  ctx.font='11px Inter';ctx.fillStyle=PAL.white;ctx.fillText('M or SPACE to close',w/2,my+mh+14);
}

function drawDialog(){
  if(!dialog) return;
  const w=canvas.width,dw=Math.min(480,w-40),dh=25+dialog.lines.length*18+25;
  const dx=(w-dw)/2,dy=canvas.height-dh-20;
  ctx.fillStyle='rgba(10,10,26,0.94)';ctx.fillRect(dx,dy,dw,dh);
  ctx.strokeStyle=PAL.gold;ctx.lineWidth=1;ctx.strokeRect(dx+3,dy+3,dw-6,dh-6);
  ctx.font='12px Inter';ctx.textAlign='left';
  dialog.lines.forEach((l,i)=>{
    ctx.fillStyle=l.includes('+')?PAL.green:l.includes('-')?PAL.accent:l.includes('--')?PAL.gold:PAL.white;
    ctx.fillText(l,dx+14,dy+22+i*18);
  });
  if(animFrame%50<25){ctx.fillStyle=PAL.gold;ctx.font='10px Inter';ctx.textAlign='center';ctx.fillText('[SPACE]',dx+dw/2,dy+dh-8);}
}

function drawChoiceDialog(){
  if(!choiceDialog) return;
  const w=canvas.width,lc=choiceDialog.lines.length,cc=choiceDialog.choices.length;
  const dw=Math.min(480,w-40),dh=50+lc*18+cc*24+15;
  const dx=(w-dw)/2,dy=canvas.height-dh-20;
  ctx.fillStyle='rgba(10,10,26,0.94)';ctx.fillRect(dx,dy,dw,dh);
  ctx.strokeStyle=PAL.gold;ctx.lineWidth=1;ctx.strokeRect(dx+3,dy+3,dw-6,dh-6);
  ctx.fillStyle=PAL.gold;ctx.font='bold 12px Inter';ctx.textAlign='left';
  ctx.fillText(choiceDialog.name,dx+14,dy+22);
  ctx.font='12px Inter';
  choiceDialog.lines.forEach((l,i)=>{ctx.fillStyle=PAL.white;ctx.fillText(l,dx+14,dy+40+i*18);});
  const csY=dy+40+lc*18+8;
  choiceDialog.choices.forEach((c,i)=>{
    const sel=i===choiceDialog.selectedIndex,cy=csY+i*24;
    if(sel){ctx.fillStyle='rgba(255,200,50,0.12)';ctx.fillRect(dx+10,cy-12,dw-20,22);}
    ctx.fillStyle=sel?PAL.gold:'rgba(255,255,255,0.5)';
    ctx.font=sel?'bold 12px Inter':'12px Inter';
    ctx.fillText((sel?'> ':'')+c.text,dx+20,cy+2);
  });
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px Inter';ctx.textAlign='center';
  ctx.fillText('UP/DOWN choose | SPACE select',dx+dw/2,dy+dh-6);
}

    ['Label',state.signed?(LABELS.find(l=>l.id===state.label)?.name||'?'):'Unsigned',state.signed?PAL.green:PAL.white],
    ['Gang Rank',state.gang?state.gangRank:'N/A',state.gang?GANGS[state.gang].color:PAL.white],
    ['Girl',state.mainGirl?womenNPCs.find(w=>w.id===state.mainGirl)?.name||'?':'Single',state.mainGirl?'#ff6b9d':PAL.white],
  ];
  ctx.font='11px Inter';
  entries.forEach(([l,v,c],i)=>{
    const ey=py+48+i*23;
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.textAlign='left';ctx.fillText(l,px+16,ey);
    ctx.fillStyle=c;ctx.textAlign='right';ctx.font='bold 11px Inter';ctx.fillText(''+v,px+pw-16,ey);ctx.font='11px Inter';
  });
  // Achievements section
  const achY=py+48+entries.length*23+8;
  if(achY<py+ph-30){
    ctx.fillStyle=PAL.gold;ctx.font='bold 10px Inter';ctx.textAlign='left';
    ctx.fillText('ACHIEVEMENTS ('+(state.achievements||[]).length+'/'+ACHIEVEMENT_DEFS.length+')',px+16,achY);
    const earned=state.achievements||[];
    let achCol=0;
    for(let i=0;i<Math.min(ACHIEVEMENT_DEFS.length,8);i++){
      const ad=ACHIEVEMENT_DEFS[i];
      const unlocked=earned.includes(ad.id);
      ctx.fillStyle=unlocked?PAL.gold:'rgba(255,255,255,0.2)';
      ctx.font='8px Inter';ctx.textAlign='left';
      ctx.fillText((unlocked?'[X] ':'[ ] ')+ad.name,px+16+(achCol>3?pw/2:0),achY+14+(i%4)*12);
      if(i===3) achCol=4;
    }
  }
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px Inter';ctx.textAlign='center';
  ctx.fillText('TAB = charts | TAB again = close',px+pw/2,py+ph-8);
}

function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.dx;p.y+=p.dy;p.life--;ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(p.x-camX,p.y-camY,4,4);}
  ctx.globalAlpha=1;
  floatingTexts=floatingTexts.filter(f=>f.life>0);
  for(const f of floatingTexts){f.y-=0.8;f.life--;ctx.globalAlpha=f.life/f.maxLife;ctx.fillStyle=f.color;ctx.font='bold 13px Inter';ctx.textAlign='center';ctx.fillText(f.text,f.x-camX+TILE/2,f.y-camY);ctx.globalAlpha=1;}
}

function drawControls(){
  if(animFrame>600) return;
  const a=animFrame>480?(600-animFrame)/120:1;
  ctx.globalAlpha=a*0.6;ctx.fillStyle='rgba(10,10,26,0.7)';
  ctx.fillRect(10,canvas.height-55,320,45);
  ctx.fillStyle=PAL.white;ctx.font='9px Inter';ctx.textAlign='left';
  ctx.fillText('MOVE: Arrows/WASD | INTERACT: Space/E | MAP: M | CAR: V',18,canvas.height-38);
  ctx.fillText('SLAP: X | SHOOT: Z | ROB: R | STATS: Tab | BUILDING: E',18,canvas.height-22);

}
