function drawVenueScene(){
  const w=canvas.width,h=canvas.height;venueAnim++;
  ctx.fillStyle='#0a0812';ctx.fillRect(0,0,w,h);
  const stY=h*0.45,stW=w*0.7,stX=(w-stW)/2;
  // Lights
  for(let i=0;i<5;i++){const lx=stX+stW*(i/4);const g=ctx.createRadialGradient(lx,stY-100,0,lx,stY-100,120);
    g.addColorStop(0,['#e63946','#ffc832','#457b9d','#7b4daa','#2a9d8f'][i]+'30');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);}
  ctx.fillStyle='#2a1a0a';ctx.fillRect(stX,stY,stW,80);
  // Crowd
  for(let i=0;i<25;i++){const cx=w*(i/25)+Math.sin(venueAnim*0.03+i)*4,cy=h*0.75+Math.sin(venueAnim*0.05+i*0.7)*6+(i%3)*12;
    ctx.fillStyle=`rgba(30,20,40,0.7)`;ctx.beginPath();ctx.arc(cx,cy-8,8,0,Math.PI*2);ctx.fill();ctx.fillRect(cx-6,cy,12,20);}
  drawCharacterSprite(stX+stW*0.3,stY-60,'down',Math.floor(venueAnim/15)%8,PAL.shirt,PAL.skin,PAL.accent);

}

function drawRhythm(){
  const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#08060f';ctx.fillRect(0,0,w,h);
  ctx.fillStyle=PAL.gold;ctx.font='bold 22px "Bebas Neue"';ctx.textAlign='center';ctx.fillText('RAP BATTLE',w/2,30);
  ctx.font='12px Inter';ctx.fillStyle=PAL.white;ctx.fillText('Hits: '+rhythmState.hits+'/'+rhythmState.prompts.length,w/2,48);
  const laneW=55,lanes={'ArrowLeft':w/2-laneW*1.5,'ArrowDown':w/2-laneW*0.5,'ArrowUp':w/2+laneW*0.5,'ArrowRight':w/2+laneW*1.5};
  const sym={'ArrowLeft':'<','ArrowDown':'v','ArrowUp':'^','ArrowRight':'>'};
  const targetY=h*0.75;
  for(const[dir,lx] of Object.entries(lanes)){
    ctx.fillStyle='rgba(255,200,50,0.1)';ctx.fillRect(lx-20,targetY-20,40,40);
    ctx.strokeStyle='rgba(255,200,50,0.3)';ctx.strokeRect(lx-20,targetY-20,40,40);
    ctx.fillStyle='rgba(255,200,50,0.3)';ctx.font='22px sans-serif';ctx.textAlign='center';ctx.fillText(sym[dir],lx,targetY+8);
  }
  const now=performance.now()-rhythmState.startTime,speed=0.25;
  for(const p of rhythmState.prompts){
    if(p.hit||p.missed) continue;
    const py=(now-p.time)*speed;if(py<-40||py>h+40) continue;
    const lx=lanes[p.dir];const glow=Math.abs(py-targetY+60)<50?1:0.6;
    ctx.fillStyle=`rgba(255,200,50,${glow})`;ctx.font='bold 26px sans-serif';ctx.textAlign='center';ctx.fillText(sym[p.dir],lx,py);
  }
  if(rhythmState.showResult){
    rhythmState.resultTimer++;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,w,h);
    ctx.textAlign='center';ctx.font='bold 32px "Bebas Neue"';
    if(rhythmState.score>=70){ctx.fillStyle=PAL.gold;ctx.fillText('YOU WON!',w/2,h/2-30);ctx.font='14px Inter';ctx.fillStyle=PAL.green;ctx.fillText('Score: '+rhythmState.score+'% | FAME +30 | CRED +15 | +$500',w/2,h/2);}
    else if(rhythmState.score>=40){ctx.fillStyle=PAL.warmGlow;ctx.fillText('TIE',w/2,h/2-30);ctx.font='14px Inter';ctx.fillStyle=PAL.white;ctx.fillText('Score: '+rhythmState.score+'% | FAME +10',w/2,h/2);}
    else{ctx.fillStyle=PAL.accent;ctx.fillText('YOU LOST',w/2,h/2-30);ctx.font='14px Inter';ctx.fillStyle=PAL.white;ctx.fillText('Score: '+rhythmState.score+'% | CRED -10',w/2,h/2);}
    ctx.font='12px Inter';ctx.fillStyle=PAL.white;ctx.fillText('SPACE to return',w/2,h/2+40);
    if(rhythmState.resultTimer>30&&(keys[' ']||keys['Enter'])){gameScene='overworld';rhythmState=null;}
  }
}

  ctx.beginPath();ctx.arc(w*0.58,h*0.4+12,10,0,Math.PI*2);ctx.fill();

  for(let i=0;i<16;i++){

    ctx.fillRect(cx-4,cy,8,16);ctx.fillStyle='#d4a574';ctx.beginPath();ctx.arc(cx,cy-5,5,0,Math.PI*2);ctx.fill();
    if((i+Math.floor(clubAnim/20))%4===0){ctx.fillStyle=['#4a2a6a','#2a4a6a','#6a2a4a','#2a6a4a'][i%4];ctx.fillRect(cx-6,cy-10+Math.sin(clubAnim*0.1)*2,3,10);}}

// ========== INTERIOR RENDERER ==========
function drawInterior(){
  if(!currentInterior) return;
  const ci=currentInterior;
  const def=ci.def;
  const w=canvas.width, h=canvas.height;

  // Calculate camera
  const tileSize=TILE;
  const mapPixW=def.w*tileSize, mapPixH=def.h*tileSize;
  let icamX=ci.playerX*tileSize-w/2+tileSize/2;
  let icamY=ci.playerY*tileSize-h/2+tileSize/2;
  icamX=Math.max(0,Math.min(mapPixW-w,icamX));
  icamY=Math.max(0,Math.min(mapPixH-h,icamY));
  // Center small interiors
  if(mapPixW<w) icamX=-(w-mapPixW)/2;
  if(mapPixH<h) icamY=-(h-mapPixH)/2;

  // Get colors (hideout changes based on gang)
  let floorColor=def.floorColor, wallColor=def.wallColor, accentColor=def.accentColor;
  if(ci.buildingId==='hideout'){
    const hc=getHideoutColors();
    floorColor=hc.floor;wallColor=hc.wall;accentColor=hc.accent;
  }

  // Background
  ctx.fillStyle='#050510';ctx.fillRect(0,0,w,h);

  // Draw tiles
  for(let y=0;y<def.h;y++){
    for(let x=0;x<def.w;x++){
      const sx=x*tileSize-icamX, sy=y*tileSize-icamY;
      if(sx<-tileSize||sx>w||sy<-tileSize||sy>h) continue;
      const tile=def.tiles[y][x];
      switch(tile){
        case 0: // floor
          ctx.fillStyle=floorColor;
          ctx.fillRect(sx,sy,tileSize,tileSize);
          // Floor pattern
          if((x+y)%2===0){ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(sx,sy,tileSize,tileSize);}
          break;
        case 1: // wall
          ctx.fillStyle=wallColor;
          ctx.fillRect(sx,sy,tileSize,tileSize);
          ctx.fillStyle='rgba(255,255,255,0.05)';
          ctx.fillRect(sx,sy,tileSize,3);
          ctx.fillStyle='rgba(0,0,0,0.15)';
          ctx.fillRect(sx,sy+tileSize-3,tileSize,3);
          break;
        case 2: // exit door
          ctx.fillStyle=floorColor;ctx.fillRect(sx,sy,tileSize,tileSize);
          ctx.fillStyle='#3a2a15';ctx.fillRect(sx+8,sy+4,tileSize-16,tileSize-8);
          ctx.fillStyle='#2a1a0a';ctx.fillRect(sx+10,sy+6,tileSize-20,tileSize-12);
          ctx.fillStyle=PAL.gold;ctx.fillRect(sx+tileSize-16,sy+tileSize/2-2,3,3);
          // EXIT label
          ctx.fillStyle=PAL.gold;ctx.font='bold 8px Inter';ctx.textAlign='center';
          ctx.fillText('EXIT',sx+tileSize/2,sy+tileSize+10);
          break;
        case 3: // special tile
          ctx.fillStyle=floorColor;ctx.fillRect(sx,sy,tileSize,tileSize);
          // Glow effect
          const gl=0.15+0.1*Math.sin(gameTime*0.05);
          ctx.fillStyle=`rgba(255,200,50,${gl})`;ctx.fillRect(sx+2,sy+2,tileSize-4,tileSize-4);
          ctx.strokeStyle=accentColor;ctx.lineWidth=1;ctx.strokeRect(sx+2,sy+2,tileSize-4,tileSize-4);
          // Label based on building
          ctx.fillStyle=PAL.gold;ctx.font='bold 7px Inter';ctx.textAlign='center';
          if(ci.buildingId==='studio'||ci.buildingId==='hwstudio')ctx.fillText('BOOTH',sx+tileSize/2,sy+tileSize/2+3);
          else if(ci.buildingId==='battle')ctx.fillText('STAGE',sx+tileSize/2,sy+tileSize/2+3);
          else if(ci.buildingId==='home'||ci.buildingId==='luxcrib')ctx.fillText('BED',sx+tileSize/2,sy+tileSize/2+3);
          else if(ci.buildingId==='dealership')ctx.fillText('CAR',sx+tileSize/2,sy+tileSize/2+3);
          else if(ci.buildingId==='church'||ci.buildingId==='mosque')ctx.fillText('PRAY',sx+tileSize/2,sy+tileSize/2+3);
          else if(ci.buildingId==='gym')ctx.fillText('TRAIN',sx+tileSize/2,sy+tileSize/2+3);
          else if(ci.buildingId==='hospital')ctx.fillText('HEAL',sx+tileSize/2,sy+tileSize/2+3);
          break;
        case 4: // counter/bar
          ctx.fillStyle=floorColor;ctx.fillRect(sx,sy,tileSize,tileSize);
          ctx.fillStyle='#4a3a2a';ctx.fillRect(sx+2,sy+4,tileSize-4,tileSize-8);
          ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(sx+2,sy+4,tileSize-4,3);
          break;
        case 5: // prop
          ctx.fillStyle=floorColor;ctx.fillRect(sx,sy,tileSize,tileSize);
          ctx.fillStyle='#333340';ctx.fillRect(sx+6,sy+6,tileSize-12,tileSize-12);
          break;
      }
    }
  }

  // Building-specific decorations
  if(ci.buildingId==='club'){
    // Disco ball
    const dbx=10*tileSize-icamX+tileSize/2, dby=1*tileSize-icamY-10;
    ctx.fillStyle='#ccc';ctx.beginPath();ctx.arc(dbx,dby,12,0,Math.PI*2);ctx.fill();
    for(let i=0;i<4;i++){
      const rx=dbx+Math.cos(i+gameTime*0.05)*8, ry=dby+Math.sin(i+gameTime*0.05)*8;
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(rx-1,ry-1,2,2);
    }
    // Dance floor lights
    for(let i=0;i<4;i++){
      const lx=5*tileSize+i*3*tileSize-icamX, ly=7*tileSize-icamY;
      const g=ctx.createRadialGradient(lx,ly,0,lx,ly,80);
      const colors=['#e63946','#9b30ff','#457b9d','#ffc832'];
      g.addColorStop(0,colors[i]+'15');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(lx-80,ly-80,160,160);
    }
  }

  // Draw interior NPCs
  for(const npc of ci.npcs){
    const sx=npc.x*tileSize-icamX, sy=npc.y*tileSize-icamY;
    if(sx<-80||sx>w+80||sy<-80||sy>h+80) continue;

    // Dancers bob animation
    const isDancer = !npc.name;
    const bobFrame = isDancer ? Math.floor((gameTime+npc.bobTimer)*0.08)%8 : 0;

    if(isDancer){
      // Simple dancing figure
      const bob=Math.sin((gameTime+npc.bobTimer)*0.1)*4;
      ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(sx+24,sy+58,12,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=npc.color;
      ctx.fillRect(sx+18,sy+30+bob,12,20); // body
      ctx.fillStyle='#d4a574';ctx.beginPath();ctx.arc(sx+24,sy+22+bob,8,0,Math.PI*2);ctx.fill(); // head
      // Arms wave
      const arm=Math.sin((gameTime+npc.bobTimer)*0.15)*8;
      ctx.fillStyle=npc.color;
      ctx.fillRect(sx+10,sy+32+bob-arm,6,12);
      ctx.fillRect(sx+32,sy+32+bob+arm,6,12);
    } else {
      drawCharacterSprite(sx,sy-16,npc.facing,bobFrame,npc.color,'#b88a5c',npc.color);
      // Name tag
      if(npc.name){
        ctx.fillStyle='rgba(0,0,0,0.5)';const nw=npc.name.length*6+12;
        ctx.fillRect(sx+24-nw/2,sy-28,nw,16);
        ctx.fillStyle=PAL.white;ctx.font='9px Inter';ctx.textAlign='center';
        ctx.fillText(npc.name,sx+24,sy-17);
      }
    }

    // Interaction prompt
    if(npc===nearInteriorNPC&&!dialog&&!choiceDialog){
      const by=Math.sin(animFrame*0.1)*4;
      ctx.fillStyle=PAL.gold;ctx.font='bold 12px Inter';ctx.textAlign='center';
      ctx.fillText('E/SPACE',sx+24,sy-38+by);
    }
  }

  // Draw player
  const psx=ci.playerX*tileSize-icamX, psy=ci.playerY*tileSize-icamY;
  const pShirtC=(state.outfit&&state.outfit.shirt!=='default')?state.outfit.shirt:PAL.shirt;
  drawCharacterSprite(psx,psy-16,ci.facing,walkFrame,pShirtC,PAL.skin,PAL.accent);
  // Interior jewelry overlays
  if(state.jewelry&&state.jewelry.chain){ctx.fillStyle='#ffc832';ctx.fillRect(psx+17,psy+8-Math.sin(walkFrame*Math.PI/4)*2,14,3);}
  if(state.jewelry&&state.jewelry.watch){ctx.fillStyle='#ccc';ctx.fillRect(psx+4,psy+26-Math.sin(walkFrame*Math.PI/4)*2,6,4);}
  if(state.jewelry&&state.jewelry.rings){ctx.fillStyle='#ffc832';ctx.fillRect(psx+37,psy+26-Math.sin(walkFrame*Math.PI/4)*2,4,3);}

  // Interior prompt for special tiles
  if(showingPrompt&&!nearInteriorNPC&&!dialog&&!choiceDialog){
    const tile=ci.def.tiles[ci.playerY]?.[ci.playerX];
    let label='E/SPACE';
    const labelMap={studio:'E: Record',hwstudio:'E: Record',battle:'E: Perform',home:'E: Sleep/Save',luxcrib:'E: Sleep/Save',dealership:'E: Browse',church:'E: Pray',mosque:'E: Pray',gym:'E: Train',hospital:'E: Heal'};
    if(labelMap[ci.buildingId]) label=labelMap[ci.buildingId];
    if(tile!==3){
      const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
      for(const[dx,dy] of dirs){
        const ax=ci.playerX+dx, ay=ci.playerY+dy;
        if(ax>=0&&ay>=0&&ax<ci.def.w&&ay<ci.def.h&&ci.def.tiles[ay][ax]===3){
          if(labelMap[ci.buildingId]) label=labelMap[ci.buildingId];break;
        }
      }
    }
    const px=psx+tileSize/2, py=psy-24;
    const by=Math.sin(animFrame*0.1)*4;
    ctx.font='bold 11px Inter';
    const tw=ctx.measureText(label).width+20;
    ctx.fillStyle='rgba(10,10,26,0.85)';ctx.fillRect(px-tw/2,py-10+by,tw,22);
    ctx.strokeStyle=PAL.gold;ctx.strokeRect(px-tw/2,py-10+by,tw,22);
    ctx.fillStyle=PAL.gold;ctx.textAlign='center';ctx.fillText(label,px,py+5+by);
  }

  // Interior title
  const bld=buildings.find(bb=>bb.id===ci.buildingId);
  const iName=bld?bld.name:ci.buildingId.toUpperCase();
  ctx.fillStyle='rgba(10,10,26,0.7)';ctx.fillRect(10,8,iName.length*12+30,28);
  ctx.strokeStyle=accentColor+'60';ctx.strokeRect(10,8,iName.length*12+30,28);
  ctx.fillStyle=accentColor;ctx.font='bold 18px "Bebas Neue"';ctx.textAlign='left';
  ctx.fillText(iName,20,28);

  // Mini interior map
  const mmw=80,mmh=60,mmx=w-mmw-10,mmy=10;
  ctx.fillStyle='rgba(10,10,26,0.8)';ctx.fillRect(mmx,mmy,mmw,mmh);
  ctx.strokeStyle=accentColor+'40';ctx.strokeRect(mmx,mmy,mmw,mmh);
  const msx=mmw/def.w,msy=mmh/def.h;
  for(let y=0;y<def.h;y++){for(let x=0;x<def.w;x++){
    const t=def.tiles[y][x];
    if(t===1)ctx.fillStyle=wallColor+'88';
    else if(t===2)ctx.fillStyle='#3a2a15';
    else if(t===3)ctx.fillStyle=PAL.gold+'44';
    else if(t===4)ctx.fillStyle='#4a3a2a88';
    else continue;
    ctx.fillRect(mmx+x*msx,mmy+y*msy,msx,msy);
  }}
  // Player dot
  ctx.fillStyle=(animFrame%30<15)?'#fff':PAL.gold;
  ctx.fillRect(mmx+ci.playerX*msx-1,mmy+ci.playerY*msy-1,3,3);
  // NPC dots
  for(const n of ci.npcs){ctx.fillStyle=n.color;ctx.fillRect(mmx+n.x*msx,mmy+n.y*msy,2,2);}
}

// ========== TRANSITION RENDERER ==========
function updateTransition(){
  if(!interiorTransition) return;

  if(interiorTransition.type==='in'){
    interiorTransition.alpha += 0.06;
    if(interiorTransition.alpha>=1){
      interiorTransition.alpha=1;
      loadInterior(interiorTransition.targetBuildingId);
      interiorTransition.type='fadein';
    }
  } else if(interiorTransition.type==='out'){
    interiorTransition.alpha += 0.06;
    if(interiorTransition.alpha>=1){
      interiorTransition.alpha=1;
      completeExitInterior();
      interiorTransition.type='fadein';
    }
  } else if(interiorTransition.type==='fadein'){
    interiorTransition.alpha-=0.06;
    if(interiorTransition.alpha<=0){interiorTransition=null;}
  }
}

function drawTransition(){
  if(!interiorTransition) return;
  ctx.fillStyle=`rgba(0,0,0,${Math.min(1,interiorTransition.alpha)})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ========== PHASE C: ROB MECHANIC ==========
function doRob(){
  if(gameScene!=='overworld'||dialog||choiceDialog) return;
  // Check for nearby target
  let target=null,type='pedestrian';
  // Check named NPCs
  if(nearNPC){
    if(nearNPC.id==='hater') type='hater';
    else if(nearNPC.id.startsWith('leader_')) type='dealer';
    else if(nearNPC.id==='cop1'||nearNPC.id==='cop2'||nearNPC.name?.includes('Officer')) type='cop';
    else type='pedestrian';
    target=nearNPC;
  }
  // Check ambient NPCs
  if(!target){
    for(const a of ambientNPCs){
      const dx=Math.abs(state.px-a.x),dy=Math.abs(state.py-a.y);
      if(dx+dy<=1&&dx+dy>0){target=a;type=a.color==='#2a3a6a'?'cop':a.color==='#8a2030'?'hater':'pedestrian';break;}
    }
  }
  if(!target){showDialog(['Nobody nearby to rob.']);return;}

  sfxSlap();state.screenShake=8;state.karma=Math.max(0,(state.karma||0)-5);
  checkAchievement('first_rob');
  const roll=Math.random()*100;
  if(type==='cop'){
    if(roll<5){
      const loot=1000+Math.floor(Math.random()*2000);
      state.money+=loot;state.wanted=5;state.heat+=50;
      sfxCash();spawnFloatingText(state.px*TILE,state.py*TILE-30,'+$'+loot+'!',PAL.green);
      showDialog(['Robbed a COP?! +$'+loot,'WANTED 5 STARS. Run.']);
    } else {
      state.energy=Math.max(0,state.energy-50);state.wanted=Math.min(5,state.wanted+3);state.heat+=30;
      sfxGunshot();showDialog(['Cop turned around and tased you.','ENERGY -50, WANTED +3']);
    }
  } else if(type==='dealer'){
    if(roll<30){
      const loot=300+Math.floor(Math.random()*500);
      state.money+=loot;state.heat+=15;
      sfxCash();spawnFloatingText(state.px*TILE,state.py*TILE-30,'+$'+loot,PAL.green);
      showDialog(['Robbed the plug. +$'+loot,'HEAT +15']);
    } else {
      state.energy=Math.max(0,state.energy-50);state.heat+=10;
      sfxGunshot();showDialog(['They shot back! ENERGY -50']);
    }
  } else if(type==='hater'){
    if(roll<60){
      state.cred+=10;state.heat+=20;state.karma=Math.max(0,state.karma-10);
      sfxCash();spawnFloatingText(state.px*TILE,state.py*TILE-30,'CRED +10',PAL.gold);
      showDialog(['Ran his pockets. CRED +10, HEAT +20']);
    } else {
      state.cred-=5;state.heat+=10;
      showDialog(['He got away. CRED -5, HEAT +10']);
    }
  } else {
    if(roll<50){
      const loot=50+Math.floor(Math.random()*150);
      state.money+=loot;state.heat+=10;
      sfxCash();spawnFloatingText(state.px*TILE,state.py*TILE-30,'+$'+loot,PAL.green);
      showDialog(['Snatched $'+loot+'. HEAT +10, KARMA -5']);
    } else {
      state.heat+=5;
      showDialog(['They ran. Got nothing. HEAT +5']);
    }
  }
  clampState();saveState();
}

  const r=safecrackState.rotation,g=safecrackState.greenZone,w=safecrackState.greenWidth;
  const dist=Math.abs(r-g);
  const inZone=dist<w/2||(360-dist)<w/2;
  if(inZone){
    safecrackState.hits++;sfxHit();
    safecrackState.currentDigit++;
    safecrackState.greenZone=Math.random()*360;
    safecrackState.speed+=0.5;
    safecrackState.greenWidth=Math.max(20,safecrackState.greenWidth-5);
    if(safecrackState.currentDigit>=4){
      safecrackState.done=true;safecrackState.success=true;
    }
  } else {
    sfxMiss();safecrackState.done=true;safecrackState.success=false;
  }
}

function drawSafeCrack(){
  const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0a0a15';ctx.fillRect(0,0,w,h);
  ctx.fillStyle=PAL.gold;ctx.font='bold 24px "Bebas Neue"';ctx.textAlign='center';
  ctx.fillText('CRACK THE SAFE',w/2,40);
  ctx.font='12px Inter';ctx.fillStyle=PAL.white;
  ctx.fillText('Digit '+(safecrackState.currentDigit+1)+'/4 — Press SPACE when arrow hits GREEN',w/2,65);

  // Draw dial
  const cx=w/2,cy=h/2,radius=100;
  ctx.strokeStyle='#444';ctx.lineWidth=8;ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.stroke();
  // Green zone
  const gStart=(safecrackState.greenZone-safecrackState.greenWidth/2)*Math.PI/180;
  const gEnd=(safecrackState.greenZone+safecrackState.greenWidth/2)*Math.PI/180;
  ctx.strokeStyle='#2a9d8f';ctx.lineWidth=10;ctx.beginPath();ctx.arc(cx,cy,radius,gStart,gEnd);ctx.stroke();
  // Arrow
  const angle=safecrackState.rotation*Math.PI/180;
  const ax=cx+Math.cos(angle)*radius,ay=cy+Math.sin(angle)*radius;
  ctx.fillStyle=PAL.accent;ctx.beginPath();ctx.arc(ax,ay,8,0,Math.PI*2);ctx.fill();
  // Progress
  for(let i=0;i<4;i++){
    ctx.fillStyle=i<safecrackState.currentDigit?PAL.green:'#333';
    ctx.fillRect(cx-50+i*30,cy+130,20,20);
    ctx.fillStyle=PAL.white;ctx.font='bold 12px Inter';
    ctx.fillText(i<safecrackState.currentDigit?'OK':'?',cx-40+i*30,cy+144);
  }

  if(safecrackState.done){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,w,h);
    ctx.textAlign='center';
    if(safecrackState.success){
      ctx.fillStyle=PAL.gold;ctx.font='bold 32px "Bebas Neue"';ctx.fillText('SAFE CRACKED!',w/2,h/2-20);
      const loot=2000+Math.floor(Math.random()*3000);
      ctx.font='14px Inter';ctx.fillStyle=PAL.green;ctx.fillText('+$'+loot+' + all jewelry',w/2,h/2+10);
      if(!safecrackState.rewarded){
        safecrackState.rewarded=true;
        state.money+=loot;state.heat+=50;state.karma=Math.max(0,state.karma-15);
        state.jewelry={chain:true,watch:true,rings:true};
        state.pawnSafeRobbed=true;calcDrip();sfxWin();sfxCash();clampState();saveState();
      }
    } else {
      ctx.fillStyle=PAL.accent;ctx.font='bold 32px "Bebas Neue"';ctx.fillText('BUSTED!',w/2,h/2-20);
      ctx.font='14px Inter';ctx.fillStyle=PAL.white;ctx.fillText('Alarm triggered. WANTED +4',w/2,h/2+10);
      if(!safecrackState.rewarded){
        safecrackState.rewarded=true;
        state.wanted=Math.min(5,state.wanted+4);state.heat+=30;sfxAlert();clampState();saveState();
      }
    }
    ctx.font='12px Inter';ctx.fillStyle=PAL.white;ctx.fillText('SPACE to continue',w/2,h/2+50);
  }
}

function calcDrip(){
  let d=0;
  if(state.jewelry.chain) d+=5;if(state.jewelry.watch) d+=10;if(state.jewelry.rings) d+=15;
  const outfitItem=OUTFIT_ITEMS.find(o=>o.shirt===state.outfit?.shirt);
  if(outfitItem) d+=outfitItem.drip;
  if(state.outfit?.hat) d+=2;if(state.outfit?.glasses) d+=4;if(state.outfit?.grill) d+=8;
  state.drip=d;
}

function updateDefendBlock(){
  if(!defendBlockEvent||!defendBlockEvent.active) return;

    defendBlockEvent.active=false;

    clampState();saveState();

function generateTileDecorations(){
  const decs={cracks:[],manholes:[],oilStains:[],seams:[]};
  for(let ty=0;ty<MAP_H;ty++){for(let tx=0;tx<MAP_W;tx++){
    if(isSidewalk(tx,ty)){
      const ghettoMult=isGhetto(tx,ty)?2.5:isHollywoodHills(tx,ty)?0.3:1;
      if(Math.random()<0.08*ghettoMult) decs.cracks.push({x:tx,y:ty,r:Math.random()*Math.PI,len:6+Math.random()*12});
      if(tx%4===0) decs.seams.push({x:tx,y:ty});
    }
    if(isRoad(tx,ty)){
      if(Math.random()<0.04*((isGhetto(tx,ty)?2:1))) decs.oilStains.push({x:tx,y:ty,size:8+Math.random()*14});
      if(Math.random()<0.02&&!isSidewalk(tx,ty)) decs.manholes.push({x:tx,y:ty});
    }
  }}
  return decs;
}
if(!state.tileDecorations) state.tileDecorations=generateTileDecorations();

  const w=canvas.width,h=canvas.height;

  while(raindrops.length<max) raindrops.push({x:Math.random()*w,y:Math.random()*h,speed:4+Math.random()*4,len:8+Math.random()*8});

function addNotification(text,type){
  const icons={weather:'~',chart:'#',beef:'!',spawn:'*',relationship:'<3',money:'$',heat:'^',random:'?'};
  notifications.unshift({text:(icons[type]||'>')+ ' '+text,life:360,maxLife:360,type});

}
function updateNotifications(){notifications=notifications.filter(n=>{n.life--;return n.life>0;});}
function drawNotifications(){
  if(gameScene!=='overworld') return;
  const x=canvas.width-220,maxVisible=4;
  let drawn=0;
  for(let i=0;i<notifications.length&&drawn<maxVisible;i++){
    const n=notifications[i];
    const alpha=n.life>300?Math.min(1,(n.maxLife-n.life)/30):n.life/60;
    if(alpha<=0) continue;
    const y=140+drawn*28;
    ctx.globalAlpha=alpha;
    const colors={weather:'#457b9d',chart:'#ffc832',beef:'#e63946',spawn:'#ff6b9d',relationship:'#ff6b9d',money:'#2a9d8f',heat:'#e76f51',random:'#7b4daa'};

    ctx.fillStyle=colors[n.type]||PAL.white;ctx.font='bold 9px Inter';ctx.textAlign='left';
    ctx.fillText(n.text.substring(0,34),x,y+2);
    ctx.globalAlpha=1;
    drawn++;
  }
}

function updateCharts(){

  const playerTracks=(state.tracksArray||[]).filter(t=>!state.charts.some(c=>c.isPlayer&&c.track===t.name));

    const qualScore=pt.quality==='S'?200:pt.quality==='A'?150:pt.quality==='B'?100:pt.quality==='C'?60:30;
    const entryScore=qualScore+state.fame*2+(state.drip||0)*3;
    state.charts.push({rank:50,artist:'YOU',track:pt.name,isPlayer:true,delta:0,score:entryScore});
  }
  // Update scores: rivals shift randomly, player tracks boost by fame
  for(const c of state.charts){
    if(c.isPlayer){
      c.score+=state.fame*0.5+(state.signed?20:0)+(state.drip||0);
      c.score+=Math.random()*40-15;
    } else {
      c.score+=Math.random()*60-30;
    }
    c.score=Math.max(10,c.score);
  }
  // Sort and assign ranks
  state.charts.sort((a,b)=>b.score-a.score);
  state.charts=state.charts.slice(0,50);
  for(let i=0;i<state.charts.length;i++){
    const oldRank=state.charts[i].rank;
    state.charts[i].rank=i+1;
    state.charts[i].delta=oldRank-(i+1);// positive = went up
  }
  // Notify player chart movements
  for(const c of state.charts){
    if(c.isPlayer&&c.delta!==0){
      const dir=c.delta>0?'up':'down';
      addNotification('"'+c.track+'" moved '+Math.abs(c.delta)+' spots '+dir+', now #'+c.rank,'chart');
    }
  }
  // Top 10 fame bonus
  const top10player=state.charts.filter(c=>c.isPlayer&&c.rank<=10);
  if(top10player.length>0) state.fame+=5;
  // #1 bonus
  if(state.charts[0]&&state.charts[0].isPlayer){
    state.fame+=30;state.cred=Math.min(100,state.cred+20);
    addNotification('YOUR TRACK IS #1!','chart');
    checkAchievement('chart_1');
  }
  saveState();
}

function drawChartsPanel(){
  const w=canvas.width,h=canvas.height;
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,w,h);
  const pw=Math.min(460,w-30),ph=Math.min(500,h-30),px=(w-pw)/2,py=(h-ph)/2;
  ctx.fillStyle='rgba(15,15,35,0.95)';ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle=PAL.gold;ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);
  ctx.fillStyle=PAL.gold;ctx.font='bold 20px "Bebas Neue"';ctx.textAlign='center';
  ctx.fillText('BILLBOARD CHARTS  -  WEEK '+state.chartWeek,px+pw/2,py+26);
  ctx.font='9px Inter';ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText('Updates every 7 sleeps | TAB to close',px+pw/2,py+40);
  const startY=py+54,rowH=17,maxRows=Math.min(25,state.charts.length);
  ctx.font='bold 9px Inter';ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('#',px+8,startY);ctx.fillText('ARTIST',px+30,startY);ctx.fillText('TRACK',px+140,startY);ctx.fillText('CHG',px+pw-40,startY);
  for(let i=0;i<maxRows;i++){
    const c=state.charts[i];
    const y=startY+14+(i*rowH);
    if(c.isPlayer){ctx.fillStyle='rgba(255,200,50,0.08)';ctx.fillRect(px+4,y-10,pw-8,rowH);}
    ctx.fillStyle=c.isPlayer?PAL.gold:i<10?PAL.white:'rgba(255,255,255,0.5)';
    ctx.font=c.isPlayer?'bold 9px Inter':'9px Inter';ctx.textAlign='right';
    ctx.fillText(c.rank,px+20,y);
    ctx.textAlign='left';
    ctx.fillText(c.artist.substring(0,14),px+30,y);
    ctx.fillStyle=c.isPlayer?PAL.warmGlow:'rgba(255,255,255,0.6)';
    ctx.fillText(c.track.substring(0,18),px+140,y);
    if(c.delta!==0){
      ctx.fillStyle=c.delta>0?PAL.green:PAL.accent;
      ctx.textAlign='right';
      ctx.fillText((c.delta>0?'+':'')+c.delta,px+pw-10,y);
    }
    ctx.textAlign='left';
  }
}

// ========== v4.3: BEEF SYSTEM ==========
function checkBeefTrigger(){
  if(state.beef.active) return;
  if(state.day-state.lastBeefDay<7+Math.floor(Math.random()*4)) return;
  // Trigger beef
  const rival=RIVAL_RAPPERS[Math.floor(Math.random()*RIVAL_RAPPERS.length)];
  const dissTitles=['You Ain\'t Real','Fake Drip','Clout Chaser','Paper Rapper','Ghost Written','Studio Gangster','Copy Cat','Broke Boy','All Cap','No Talent'];
  const dissTrack=dissTitles[Math.floor(Math.random()*dissTitles.length)];
  state.beef.active={rival,dissTrack,day:state.day,responded:false};
  state.lastBeefDay=state.day;
  addNotification(rival+' dropped a diss: "'+dissTrack+'"','beef');
  sfxAlert();
  // Show popup after slight delay
  setTimeout(()=>{
    if(state.beef.active&&!state.beef.active.responded){
      choiceDialog={name:'BEEF!',
        lines:[rival+' just dropped "'+dissTrack+'" aimed at YOU.','Respond or take the L.'],
        choices:[
          {text:'Drop a diss back (studio)',effect:()=>{
            state.beef.active.responded=true;state.beef.active.responseType='diss';
            // Go to studio for special diss session
            showDialog(['Hit the studio. Drop a response track.','Next studio session = diss mode.']);
          },response:null},
          {text:'Ignore it',effect:()=>{
            state.fame=Math.max(0,state.fame-10);state.cred=Math.max(0,state.cred-10);
            state.beef.history.push({...state.beef.active,outcome:'ignored'});
            state.beef.active=null;
            addNotification('You took the L on the beef','beef');
          },response:'FAME -10, CRED -10. Streets noticed.'},
          {text:'Settle in person',effect:()=>{
            state.beef.active.responded=true;state.beef.active.responseType='confront';
            // Spawn rival NPC at random location
            const spots=[{x:18,y:23},{x:30,y:11},{x:8,y:9},{x:25,y:19}];
            const spot=spots[Math.floor(Math.random()*spots.length)];
            state.beef.active.meetX=spot.x;state.beef.active.meetY=spot.y;
            showDialog(['Meet '+rival+' at the corner.','Handle it how you want. X:slap Z:shoot']);
          },response:null},
        ],selectedIndex:0};
    }
  },300);
}

// ========== v4.3: ACHIEVEMENTS ==========
const ACHIEVEMENT_DEFS=[
  {id:'first_track',name:'First Track',desc:'Record your first track'},
  {id:'first_1k',name:'Thousandaire',desc:'Reach $1,000'},
  {id:'first_10k',name:'Stacking',desc:'Reach $10,000'},
  {id:'first_100k',name:'Six Figures',desc:'Reach $100,000'},
  {id:'first_girl',name:'Player',desc:'Get your first girl'},
  {id:'first_rob',name:'Stick Up Kid',desc:'Rob someone'},
  {id:'first_defend',name:'Block Captain',desc:'Defend your block'},
  {id:'first_diss_won',name:'Diss King',desc:'Win a beef'},
  {id:'first_label',name:'Signed Artist',desc:'Sign a label deal'},
  {id:'indie_label',name:'Indie Records',desc:'Sign with Indie'},
  {id:'major_label',name:'Major Label',desc:'Sign with Major'},
  {id:'boutique_label',name:'Boutique Label',desc:'Sign with Boutique'},
  {id:'gang_boss',name:'The Boss',desc:'Reach Boss gang rank'},
  {id:'chart_1',name:'Number One',desc:'Hit #1 on charts'},
  {id:'survived_prison',name:'Survivor',desc:'Survive prison'},
  {id:'max_drip',name:'Drip God',desc:'Max out drip stat'},
  {id:'first_gang_rank',name:'Gang Up',desc:'First gang rank promotion'},
];
function checkAchievement(id){
  if(!state.achievements) state.achievements=[];
  if(state.achievements.includes(id)) return;
  state.achievements.push(id);
  const def=ACHIEVEMENT_DEFS.find(a=>a.id===id);
  if(def){
    addNotification('ACHIEVEMENT: '+def.name,'chart');
    state.fame+=5;
    achievementBanner={text:def.name+' - '+def.desc,timer:180};
    sfxWin();
  }
  saveState();
}
let achievementBanner=null;
function drawAchievementBanner(){
  if(!achievementBanner) return;
  achievementBanner.timer--;
  if(achievementBanner.timer<=0){achievementBanner=null;return;}
  const alpha=achievementBanner.timer>150?Math.min(1,(180-achievementBanner.timer)/30):achievementBanner.timer/60;
  const w=canvas.width;
  ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(255,200,50,0.9)';ctx.fillRect(w*0.15,8,w*0.7,28);
  ctx.fillStyle='#1a1a2e';ctx.font='bold 12px Inter';ctx.textAlign='center';
  ctx.fillText(achievementBanner.text,w/2,26);
  ctx.globalAlpha=1;
}
// Passive achievement checks
function checkPassiveAchievements(){
  if(state.money>=1000) checkAchievement('first_1k');
  if(state.money>=10000) checkAchievement('first_10k');
  if(state.money>=100000) checkAchievement('first_100k');
  if(state.tracks>=1) checkAchievement('first_track');
  if(state.mainGirl) checkAchievement('first_girl');
  if(state.signed) checkAchievement('first_label');
  if(state.label==='indie') checkAchievement('indie_label');
  if(state.label==='major') checkAchievement('major_label');
  if(state.label==='boutique') checkAchievement('boutique_label');
  if(state.gangRank==='Boss') checkAchievement('gang_boss');
  if(state.drip>=60) checkAchievement('max_drip');
}

// ========== v4.3: RANDOM STREET EVENTS ==========
function checkStreetEvent(){
  if(gameScene!=='overworld'||dialog||choiceDialog||isDriving) return;
  if(state.streetEventCooldown>0){state.streetEventCooldown--;return;}
  // 4% chance per move on sidewalk/road
  if(Math.random()>0.04) return;
  if(!isSidewalk(state.px,state.py)&&!isRoad(state.px,state.py)) return;
  state.streetEventCooldown=30;// cooldown ~30 moves
  const roll=Math.random();
  if(roll<0.25){
    const amt=20+Math.floor(Math.random()*80);
    state.money+=amt;sfxMoney();
    addNotification('$'+amt+' found on the ground!','money');
    spawnFloatingText(state.px*TILE,state.py*TILE-30,'+$'+amt,PAL.green);
  } else if(roll<0.45){
    choiceDialog={name:'FAN',lines:['OMG! Can I get an autograph?'],
      choices:[
        {text:'Sure!',effect:()=>{state.cred+=3;state.fame+=5;addNotification('Fan asked for autograph!','random');},response:'CRED +3, FAME +5'},
        {text:'Not now',effect:()=>{state.cred=Math.max(0,state.cred-3);},response:'They look hurt. CRED -3'},
      ],selectedIndex:0};
  } else if(roll<0.6){
    choiceDialog={name:'DEALER',lines:['Yo... need anything?'],
      choices:[
        {text:'Buy ($200)',effect:()=>{
          if(state.money>=200&&!state.hasProduct){state.money-=200;state.hasProduct=true;state.flipDaysLeft=1+Math.floor(Math.random()*2);
            state.flipPayout=400+Math.floor(Math.random()*400);sfxCash();}
        },response:state.money>=200&&!state.hasProduct?'Package secured.':'Can\'t right now.'},
        {text:'Nah',effect:()=>{},response:''},
      ],selectedIndex:0};
  } else if(roll<0.75){
    // Drive-by
    sfxGunshot();state.screenShake=12;state.energy=Math.max(0,state.energy-20);
    addNotification('Opp drive-by!','heat');
    showDialog(['SHOTS FIRED! Drive-by!','ENERGY -20. Keep your head down.']);
  } else {
    choiceDialog={name:'CHARITY',lines:['Help the community?'],
      choices:[
        {text:'Donate $50',effect:()=>{if(state.money>=50){state.money-=50;state.karma+=15;state.fame+=3;addNotification('Donated to charity','random');}},
          response:state.money>=50?'Good karma. KARMA +15, FAME +3':'Need $50.'},
        {text:'Keep walking',effect:()=>{},response:''},
      ],selectedIndex:0};
  }
  clampState();saveState();
}

// ========== v4.3: ENHANCED PARTICLE EFFECTS ==========
function spawnExhaustPuff(x,y,dir){
  const dx=dir==='left'?2:dir==='right'?-2:0;
  const dy=dir==='up'?2:dir==='down'?-2:0;
  for(let i=0;i<2;i++){
    particles.push({x:x+24+dx*10+Math.random()*6,y:y+40+dy*10,color:'rgba(120,120,120,0.4)',
      dx:dx*0.3+(Math.random()-0.5)*0.5,dy:dy*0.3-0.5,life:25,maxLife:25});
  }
}
function spawnSparkle(x,y){
  for(let i=0;i<5;i++){
    const angle=Math.random()*Math.PI*2;
    particles.push({x:x+24,y:y+20,color:'rgba(255,200,50,0.8)',
      dx:Math.cos(angle)*2,dy:Math.sin(angle)*2-1,life:30,maxLife:30});
  }
}
function spawnSleepZ(x,y){
  for(let i=0;i<3;i++){
    floatingTexts.push({x:x+10+i*10,y:y-10-i*15,text:'Z',color:'rgba(255,255,255,0.6)',life:60+i*20,maxLife:60+i*20});
  }
}
function spawnDustCloud(x,y){
  for(let i=0;i<4;i++){
    particles.push({x:x+20+Math.random()*8,y:y+40,color:'rgba(180,160,120,0.5)',
      dx:(Math.random()-0.5)*3,dy:-Math.random()*2,life:20,maxLife:20});
  }
}
function spawnMoneyBills(x,y){
  for(let i=0;i<6;i++){
    particles.push({x:x+Math.random()*40,y:y,color:'rgba(50,180,80,0.7)',
      dx:(Math.random()-0.5)*3,dy:Math.random()*2+1,life:60,maxLife:60});
  }
}

// Charts panel toggle (Tab cycles: stats -> charts -> off)
let showChartsPanel=false;

// ========== GAME LOOP ==========
function update(now){
  if(gameScene==='overworld'){handleMovement(now);checkProximity();updateNPCs();updateAmbientNPCs();updateBuildingAmbientNPCs();updateWomenNPCs();updateDefendBlock();checkStreetEvent();}
  if(gameScene==='interior'){handleMovement(now);checkProximity();}
  if(gameScene==='wordflow') updateWordFlow();
  if(gameScene==='rhythm') updateRhythm();
  if(gameScene==='safecrack') updateSafeCrack();
  if(gameScene==='prison'&&!dialog){}
  updateTransition();
  if(state.screenShake>0) state.screenShake--;
  updateGameClock();
  updateRain();
  updateNotifications();
  if(gameTime%600===0) checkPassiveAchievements();
  gameTime++;
}

function draw(){
  ctx.save();
  // Screen shake
  if(state.screenShake>0){
    const sx=(Math.random()-0.5)*state.screenShake;
    const sy=(Math.random()-0.5)*state.screenShake;
    ctx.translate(sx,sy);
  }

  ctx.clearRect(-10,-10,canvas.width+20,canvas.height+20);
  if(gameScene==='overworld'){
    drawMap();drawParkedCar();drawNPCs();drawBuildingAmbientNPCs();drawWomenNPCs();drawPlayer();drawCompanionGirl();drawParticles();
    drawRain();drawSkyTint();
    drawHUD();drawTitle();drawMiniMap();drawPrompt();drawDefendBlockTimer();
    drawNotifications();drawAchievementBanner();
    drawDialog();drawChoiceDialog();drawControls();
    drawCareerStats();if(showChartsPanel)drawChartsPanel();drawFullMap();
  } else if(gameScene==='safecrack'){drawSafeCrack();
  } else if(gameScene==='interior'){
    drawInterior();drawParticles();
    drawHUD();drawPrompt();drawDialog();drawChoiceDialog();
    drawCareerStats();drawFullMap();
  } else if(gameScene==='wordflow'){drawWordFlow();
  } else if(gameScene==='venue'){drawVenueScene();
  } else if(gameScene==='rhythm'){drawRhythm();drawParticles();
  } else if(gameScene==='club'){drawClubScene();
  } else if(gameScene==='prison'){drawPrisonScene();drawDialog();}
  drawTransition();

  ctx.restore();
  animFrame++;
}

function gameLoop(now){update(now);draw();requestAnimationFrame(gameLoop);}
requestAnimationFrame(gameLoop);
setInterval(saveState,10000);

// Reset (hold R for 2 seconds on title/stats screen only — overworld R is rob)
let rHoldStart=0;
window.addEventListener('keydown',e=>{if((e.key==='r'||e.key==='R')&&showCareerStats){if(!rHoldStart)rHoldStart=Date.now();}});
window.addEventListener('keyup',e=>{if(e.key==='r'||e.key==='R'){if(rHoldStart&&Date.now()-rHoldStart>2000){localStorage.removeItem('rapcareer2');location.reload();}rHoldStart=0;}});
</script>
